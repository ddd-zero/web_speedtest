# Web Speedtest 示例配置文件
# 使用方式：复制为 config.toml 后按需修改；也可以通过 WEB_SPEEDTEST_CONFIG 指定其他配置路径。

[server]
# 服务监听地址。默认 127.0.0.1 仅允许本机访问；部署到局域网或公网时可改为 0.0.0.0。
host = "127.0.0.1"
# 服务监听端口。默认值为 3000。
port = 3000

[database]
# SQLite 数据库文件路径。相对路径会基于启动进程的当前工作目录解析。
path = "speed_results.sqlite3"

[test]
# HTTPS 延迟测试轮数。程序会限制在 1 到 20 之间，轮数越多结果越稳定但耗时越长。
latency_rounds = 5
# 单次延迟探测超时时间，单位毫秒。程序会限制在 300 到 30000 之间。
latency_timeout_ms = 3500
# 下载测速持续时间，单位毫秒。程序会限制在 1000 到 120000 之间。
download_test_ms = 8500
# 下载进度自动保存比例。0.5 表示完成 50% 测试时保存一次中间结果，程序会限制在 0.05 到 0.95 之间。
progress_save_ratio = 0.5

[history]
# 历史记录接口未传 limit 时使用的默认返回数量，程序会限制在 1 到 1000 之间。
default_limit = 80
# 历史记录接口允许的最大返回数量，程序会限制在 1 到 1000 之间，且必须不小于 default_limit。
max_limit = 200

[display]
# 是否在前端显示测速域名和 CNAME。设为 false 时，主页和历史记录里的域名显示为 "-"。
show_domains = true

[domains]
# 外部 YAML 线路文件路径。该文件必须包含 domains 数组，每项至少提供 url。
path = "config.yaml"

# 可选：按 URL 覆盖外部 YAML 中已有线路的展示名称或 CNAME。
# 如果 URL 不存在，则会作为新增线路追加；URL 必须以 http:// 或 https:// 开头。
[[domains.overrides]]
url = "https://a1.steinsgate.eu.org/"
name = "自定义 a1 线路名"
cname = "a1.example-cname.com"

# 可选：追加一条不在外部 YAML 中的线路。
[[domains.overrides]]
url = "https://new-line.example.com"
name = "新增线路"
cname = "new-line.example-cname.com"
