<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>多域名网络测速</title>
  <style>
    :root {
      --bg-color: #f5f2eb;
      --card-bg: #ffffff;
      --panel-bg: #fafafa;
      --text-main: #2d2d2d;
      --text-sub: #888888;
      --accent: #da7756;
      --accent-hover: #b86448;
      --good: #2f9e44;
      --warn: #d08b26;
      --bad: #c94848;
      --border: #e6e1da;
      --font-stack: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      --mono-stack: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }

    html {
      min-height: 100%;
      scrollbar-gutter: stable;
    }

    body {
      min-height: 100dvh;
      margin: 0;
      padding: 22px;
      box-sizing: border-box;
      color: var(--text-main);
      background: var(--bg-color);
      font-family: var(--font-stack);
      -webkit-font-smoothing: antialiased;
    }

    body.history-open {
      overflow: hidden;
    }

    .layout {
      width: min(920px, 100%);
      margin: 0 auto;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid rgba(230, 225, 218, .78);
      border-radius: 18px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 4%);
    }

    .main-card {
      padding: 20px;
    }

    h1 {
      margin: 0;
      font-size: 1.48rem;
      letter-spacing: 0;
      line-height: 1.25;
    }

    .subline {
      margin-top: 7px;
      color: var(--text-sub);
      font-size: .86rem;
      line-height: 1.45;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 16px;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      font-family: var(--font-stack);
      font-size: .92rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform .2s, background .2s, border-color .2s, color .2s, opacity .2s;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: .55;
      transform: none;
    }

    .btn-primary {
      color: #fff;
      background: var(--accent);
      box-shadow: 0 4px 15px rgba(218, 119, 86, .24);
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    .btn-secondary {
      color: #555;
      background: #fff;
      border: 1px solid #ddd6ce;
    }

    .history-fab {
      position: fixed;
      right: 20px;
      top: 50%;
      z-index: 90;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 46px;
      min-height: 118px;
      padding: 14px 10px;
      border-radius: 999px;
      color: #fff;
      background: var(--accent);
      box-shadow: 0 14px 30px rgba(218, 119, 86, .32);
      writing-mode: vertical-rl;
      line-height: 1.15;
      letter-spacing: 0;
      transform: translateY(-50%);
    }

    .history-fab:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: translateY(-50%) translateX(-3px);
    }

    .info-group {
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 8px 16px;
      margin-bottom: 16px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 10px 0;
      border-bottom: 1px dashed #e8e2dc;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .label {
      color: var(--text-sub);
      font-size: .83rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .value {
      max-width: 72%;
      text-align: right;
      word-break: break-all;
      font-family: var(--mono-stack);
      font-size: .88rem;
      font-weight: 700;
      line-height: 1.4;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 16px 0 10px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0;
    }

    .mini-status {
      min-height: 1.2em;
      color: var(--text-sub);
      font-size: .78rem;
      text-align: right;
    }

    .target-list {
      display: grid;
      gap: 6px;
      max-height: 66vh;
      overflow: auto;
      padding-right: 4px;
    }

    .target-list-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 90px 110px 92px;
      gap: 10px;
      align-items: center;
      margin-bottom: 6px;
      padding: 0 10px;
      color: var(--text-sub);
      font-size: .72rem;
      font-weight: 800;
      letter-spacing: 0;
    }

    .target-row {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 90px 110px 92px;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: #fffdf9;
    }

    .target-row > :not(.target-row-progress) {
      position: relative;
      z-index: 1;
    }

    .target-row-progress {
      position: absolute;
      inset: 0 auto 0 0;
      z-index: 0;
      width: 0%;
      pointer-events: none;
      background: rgba(218, 119, 86, .16);
      transition: width .14s ease;
    }

    .target-row.recommended {
      border-color: rgba(218, 119, 86, .55);
      box-shadow: 0 8px 22px rgba(218, 119, 86, .11);
    }

    .target-row.active {
      border-color: var(--accent);
      background: #fff7f1;
    }

    .target-name {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      overflow: hidden;
      font-weight: 800;
    }

    .target-label-text,
    .target-host-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .target-label-text {
      flex: 0 1 auto;
    }

    .target-host {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      overflow: hidden;
      color: var(--text-sub);
      font-family: var(--mono-stack);
      font-size: .76rem;
      word-break: break-all;
    }

    .target-host-text {
      flex: 1 1 auto;
    }

    .target-colo {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 2px 7px;
      color: var(--colo-fg, #7a5546);
      background: var(--colo-bg, rgba(218, 119, 86, .13));
      box-shadow: inset 0 0 0 1px var(--colo-ring, rgba(218, 119, 86, .14));
      font-family: var(--mono-stack);
      font-size: .68rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 3px 8px;
      color: var(--accent);
      background: rgba(218, 119, 86, .12);
      font-size: .72rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .metric {
      text-align: right;
      font-family: var(--mono-stack);
    }

    .metric strong {
      display: block;
      font-size: 1.06rem;
      color: var(--text-main);
    }

    .metric span {
      color: var(--text-sub);
      font-size: .74rem;
    }

    .download-metric {
      text-align: right;
      font-family: var(--mono-stack);
    }

    .download-metric strong {
      display: block;
      color: var(--accent);
      font-size: 1.08rem;
      font-weight: 850;
    }

    .download-metric span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text-sub);
      font-size: .74rem;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
      background: rgba(45, 39, 35, .34);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition:
        opacity .2s ease,
        visibility 0s linear .2s;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition: opacity .18s ease;
    }

    .modal-overlay.active .modal-content {
      animation: popIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28) both;
    }

    .modal-overlay:focus {
      outline: none;
    }

    .modal-content {
      width: min(980px, calc(100vw - 48px));
      height: min(760px, calc(100dvh - 48px));
      box-sizing: border-box;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: #fff;
      border: 1px solid rgba(230, 225, 218, .9);
      border-radius: 18px;
      box-shadow: 0 24px 70px rgba(45, 39, 35, .22);
      transform: scale(0.95);
      transform-origin: center;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .modal-header,
    .history-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #eee7df;
      background: #fff;
    }

    .modal-header {
      justify-content: space-between;
      padding: 18px 20px 16px;
    }

    .modal-title {
      margin: 0;
      font-size: 1.12rem;
      line-height: 1.2;
    }

    .history-subtitle {
      margin-top: 4px;
      color: var(--text-sub);
      font-size: .78rem;
    }

    .close-btn {
      width: 36px;
      height: 36px;
      padding: 0;
      border-radius: 50%;
      color: #777;
      background: #f7f3ee;
      border: 1px solid #eadfd7;
      font-size: 1.5rem;
      line-height: 1;
    }

    .history-toolbar {
      display: grid;
      grid-template-columns: minmax(150px, 1fr) minmax(132px, .75fr) minmax(220px, 1.35fr) auto;
      padding: 14px 20px;
      background: #fbfaf8;
    }

    .search-input,
    .search-select {
      min-width: 132px;
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #ddd6ce;
      border-radius: 10px;
      font-family: var(--font-stack);
      font-size: .9rem;
      background: #fff;
    }

    .table-container {
      flex: 1;
      overflow: auto;
      background: #fff;
    }

    table {
      width: 100%;
      min-width: 780px;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: .84rem;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      padding: 12px 12px;
      border-bottom: 1px solid #eee7df;
      color: #888;
      background: #fffdf9;
      text-align: left;
      font-weight: 700;
      white-space: nowrap;
    }

    td {
      padding: 11px 12px;
      border-bottom: 1px solid #f3f0ec;
      color: #444;
      vertical-align: middle;
    }

    tr:hover td {
      background: #fffdf9;
    }

    .col-speed {
      color: var(--accent);
      font-family: var(--mono-stack);
      font-weight: 800;
      text-align: right;
      white-space: nowrap;
    }

    .col-ip,
    .col-latency {
      font-family: var(--mono-stack);
      white-space: nowrap;
    }

    .history-domain-cell {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .history-domain-host {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 700;
    }

    .history-domain-key {
      width: fit-content;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border-radius: 999px;
      padding: 2px 8px;
      color: #9c5c4d;
      background: rgba(218, 119, 86, .12);
      font-family: var(--mono-stack);
      font-size: .72rem;
      font-weight: 800;
    }

    .history-status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 58px;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: .76rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .history-status-pill.completed {
      color: #247247;
      background: #e7f6ed;
    }

    .history-status-pill.failed {
      color: #a44b3f;
      background: #fbece8;
    }

    .history-status-pill.running {
      color: #8a5d00;
      background: #fff2cc;
    }

    .empty-row {
      padding: 26px;
      color: #999;
      text-align: center;
    }

    @media (max-width: 640px) {
      html {
        scrollbar-gutter: auto;
      }

      body {
        padding: 14px;
      }

      .target-list-header {
        display: none;
      }

      .target-row {
        grid-template-columns: 1fr;
        gap: 8px;
        align-items: stretch;
      }

      .metric strong,
      .download-metric strong {
        font-size: .98rem;
      }

      .target-row button {
        padding: 10px 12px;
      }

      .topbar {
        display: grid;
        grid-template-columns: 1fr;
      }

      .top-actions {
        width: 100%;
      }

      .top-actions button,
      .target-row button {
        width: 100%;
      }

      .modal-overlay {
        padding: 0;
      }

      .modal-content {
        width: 100vw;
        height: 100dvh;
        border-radius: 0;
        border: none;
      }

      .history-toolbar {
        grid-template-columns: 1fr;
        padding: 12px;
      }

      .modal-header {
        padding: 14px 12px;
      }

      .metric {
        text-align: left;
      }

      .download-metric {
        grid-column: auto;
        text-align: left;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .modal-overlay,
      .modal-content {
        transition: none;
      }

      .modal-overlay.active .modal-content {
        animation: none;
        transform: scale(1);
      }
    }
  </style>
</head>
<body>
  <main class="layout">
    <section class="card main-card">
      <div class="topbar">
        <div>
          <h1>多域名网络测速</h1>
          <div class="subline">自动多轮检测 HTTPS 延迟，点击域名单线程下载测速。</div>
        </div>
        <div class="top-actions">
          <button class="btn-secondary" id="refresh-latency-btn" type="button">重测延迟</button>
        </div>
      </div>

      <div class="info-group">
        <div class="info-row">
          <span class="label">用户 IP</span>
          <span class="value" id="client-ip">待检测</span>
        </div>
        <div class="info-row">
          <span class="label">IP 查询</span>
          <span class="value" id="client-location">API 待接入</span>
        </div>
        <div class="info-row">
          <span class="label">运营商</span>
          <span class="value" id="client-isp">API 待接入</span>
        </div>
      </div>

      <div class="section-title">
        <h2>域名延迟对比</h2>
        <span class="mini-status" id="latency-status">准备中</span>
      </div>
      <div class="target-list" id="target-list"></div>
    </section>
  </main>

  <button class="history-fab" id="history-btn" type="button" aria-controls="history-modal" aria-expanded="false" aria-label="打开测速记录">测速记录</button>

  <div class="modal-overlay" id="history-modal" role="dialog" aria-modal="true" aria-labelledby="history-title" aria-hidden="true" tabindex="-1">
    <div class="modal-content history-shell">
      <div class="modal-header">
        <div>
          <h2 class="modal-title" id="history-title">测速记录</h2>
          <div class="history-subtitle">按线路、状态或节点查询最近测速结果</div>
        </div>
        <button class="close-btn" id="close-history-btn" type="button" aria-label="关闭">&times;</button>
      </div>
      <div class="history-toolbar">
        <select id="history-domain" class="search-select">
          <option value="">全部域名</option>
        </select>
        <select id="history-status" class="search-select">
          <option value="">全部状态</option>
          <option value="running">测速中</option>
          <option value="completed">已完成</option>
          <option value="failed">失败</option>
        </select>
        <input id="history-query" class="search-input" placeholder="搜索位置 / 运营商 / 节点">
        <button class="btn-primary" id="query-history-btn" type="button">查询</button>
      </div>
      <div class="table-container">
        <table class="history-table">
          <colgroup>
            <col style="width: 17%">
            <col style="width: 30%">
            <col style="width: 10%">
            <col style="width: 10%">
            <col style="width: 18%">
            <col style="width: 15%">
          </colgroup>
          <thead>
            <tr>
              <th>时间</th>
              <th>域名</th>
              <th class="col-latency">HTTPS</th>
              <th>状态</th>
              <th class="col-ip">IP</th>
              <th style="text-align:right">下载速度</th>
            </tr>
          </thead>
          <tbody id="history-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const SMOOTHING = 0.3;
    const MAX_CONSECUTIVE_LATENCY_FAILURES = 3;
    const COLO_PALETTE = [
      { bg: "#eaf2ff", fg: "#205c9d", ring: "#c8ddfa" },
      { bg: "#e7f6f0", fg: "#1d6f57", ring: "#bfe7d7" },
      { bg: "#fff2cc", fg: "#8a5d00", ring: "#f4d98a" },
      { bg: "#fcecef", fg: "#a83f55", ring: "#f3c3ce" },
      { bg: "#eeeafd", fg: "#6750a4", ring: "#d8cff9" },
      { bg: "#e4f7fb", fg: "#147187", ring: "#b9e7f0" },
      { bg: "#f1f4f8", fg: "#506176", ring: "#d8e0ea" },
      { bg: "#fff0e6", fg: "#a04e20", ring: "#f3c7ad" },
      { bg: "#eaf7e8", fg: "#2f6f3e", ring: "#c8e8c1" },
      { bg: "#f3ecff", fg: "#7b4ab8", ring: "#ddcbfb" },
      { bg: "#e8f3f8", fg: "#315f7c", ring: "#c4ddea" },
      { bg: "#fff1f4", fg: "#93405d", ring: "#efc8d4" },
    ];
    const assignedColoColorIndexes = new Map();

    const state = {
      targets: [],
      test: {
        latency_rounds: 5,
        latency_timeout_ms: 3500,
        download_test_ms: 8500,
        progress_save_ratio: 0.5,
      },
      targetStates: new Map(),
      activeTargetKey: null,
      currentClientIp: "",
      currentColos: new Map(),
      isDownloading: false,
      isHistoryOpen: false,
      downloadController: null,
      stopRequested: false,
    };

    const els = {
      targetList: document.getElementById("target-list"),
      latencyStatus: document.getElementById("latency-status"),
      refreshLatencyBtn: document.getElementById("refresh-latency-btn"),
      historyBtn: document.getElementById("history-btn"),
      historyModal: document.getElementById("history-modal"),
      closeHistoryBtn: document.getElementById("close-history-btn"),
      historyDomain: document.getElementById("history-domain"),
      historyStatus: document.getElementById("history-status"),
      historyQuery: document.getElementById("history-query"),
      queryHistoryBtn: document.getElementById("query-history-btn"),
      historyBody: document.getElementById("history-body"),
      clientIp: document.getElementById("client-ip"),
      clientLocation: document.getElementById("client-location"),
      clientIsp: document.getElementById("client-isp"),
    };

    window.addEventListener("DOMContentLoaded", init);

    els.refreshLatencyBtn.addEventListener("click", () => runLatencyRounds());
    els.historyBtn.addEventListener("click", openHistory);
    els.closeHistoryBtn.addEventListener("click", () => toggleHistory(false));
    els.historyModal.addEventListener("click", event => {
      if (event.target === els.historyModal) toggleHistory(false);
    });
    els.queryHistoryBtn.addEventListener("click", loadHistory);
    window.addEventListener("keydown", event => {
      if (event.key === "Escape" && state.isHistoryOpen) toggleHistory(false);
    });

    async function init() {
      await loadConfig();
      runLatencyRounds();
    }

    async function loadConfig() {
      try {
        const response = await fetch("/api/config", { cache: "no-store" });
        if (!response.ok) throw new Error(`配置加载失败: ${response.status}`);
        const config = await response.json();
        state.targets = config.targets || [];
        state.test = {
          ...state.test,
          ...(config.test || {}),
        };
        state.targetStates = new Map(state.targets.map(target => [target.key, createTargetState()]));
        renderHistoryDomainOptions();
        renderTargetList();
      } catch (error) {
        els.targetList.innerHTML = `<div class="empty-row">${escapeHtml(error.message)}</div>`;
        els.latencyStatus.textContent = "配置加载失败";
      }
    }

    function createTargetState() {
      return {
        samples: [],
        stats: null,
        status: "waiting",
        error: "",
        consecutiveLatencyFailures: 0,
        latencySkipped: false,
        downloadStatus: "idle",
        downloadSpeedMbps: null,
        downloadProgress: 0,
        downloadedBytes: 0,
        downloadMessage: "",
      };
    }

    async function runLatencyRounds() {
      if (!state.targets.length || state.isDownloading) return;
      state.targetStates.forEach(targetState => {
        targetState.samples = [];
        targetState.stats = null;
        targetState.status = "testing";
        targetState.error = "";
        targetState.consecutiveLatencyFailures = 0;
        targetState.latencySkipped = false;
      });
      state.currentColos.clear();
      els.latencyStatus.textContent = `延迟测试 0/${state.test.latency_rounds}`;
      renderTargetList();

      for (let round = 1; round <= state.test.latency_rounds; round += 1) {
        await Promise.all(state.targets.map(async target => {
          const targetState = state.targetStates.get(target.key);
          if (!targetState || targetState.latencySkipped) return;

          const result = await measureHttpsLatency(target);
          if (result.ok) {
            targetState.consecutiveLatencyFailures = 0;
            targetState.samples.push(result.ms);
            targetState.status = "testing";
            targetState.error = "";
            if (result.trace.ip && !state.currentClientIp) {
              state.currentClientIp = result.trace.ip;
              updateClientInfo();
            }
            if (result.trace.colo) {
              state.currentColos.set(target.key, result.trace.colo);
              updateClientInfo();
            }
          } else {
            targetState.consecutiveLatencyFailures += 1;
            if (targetState.consecutiveLatencyFailures >= MAX_CONSECUTIVE_LATENCY_FAILURES) {
              targetState.latencySkipped = true;
              targetState.status = targetState.samples.length ? "ready" : "failed";
              targetState.error = `连续失败 ${MAX_CONSECUTIVE_LATENCY_FAILURES} 次`;
              return;
            }
            targetState.error = `${result.error} ${targetState.consecutiveLatencyFailures}/${MAX_CONSECUTIVE_LATENCY_FAILURES}`;
          }
        }));

        state.targetStates.forEach(targetState => {
          if (targetState.samples.length) {
            targetState.stats = summarizeLatency(targetState.samples);
          }
        });
        els.latencyStatus.textContent = `延迟测试 ${round}/${state.test.latency_rounds}`;
        renderTargetList();
        if (round < state.test.latency_rounds) await sleep(140);
      }

      state.targetStates.forEach(targetState => {
        targetState.status = targetState.samples.length ? "ready" : "failed";
      });
      els.latencyStatus.textContent = "延迟测试完成";
      renderTargetList();
    }

    async function measureHttpsLatency(target) {
      const controller = new AbortController();
      const timer = window.setTimeout(() => controller.abort(), state.test.latency_timeout_ms);
      const started = performance.now();
      try {
        const response = await fetch(target.trace_url, {
          cache: "no-store",
          signal: controller.signal,
        });
        const text = await response.text();
        return {
          ok: true,
          ms: performance.now() - started,
          trace: parseTrace(text),
        };
      } catch (error) {
        return {
          ok: false,
          error: error.name === "AbortError" ? "请求超时" : "请求失败",
        };
      } finally {
        window.clearTimeout(timer);
      }
    }

    async function startDownloadTest(targetKey) {
      if (state.isDownloading && state.activeTargetKey === targetKey) {
        stopDownloadTest();
        return;
      }
      if (state.isDownloading) return;
      const target = state.targets.find(item => item.key === targetKey);
      const targetState = state.targetStates.get(targetKey);
      if (!target || !targetState || targetState.status === "failed") return;

      state.isDownloading = true;
      state.activeTargetKey = targetKey;
      state.stopRequested = false;
      let speedSamples = [];
      let smoothedSpeed = 0;
      let receivedBytes = 0;
      let lastBytes = 0;
      let lastTime = performance.now();
      let savePromise = null;
      let savedRecord = null;

      resetDownloadUi(targetKey);
      renderTargetList();

      const controller = new AbortController();
      state.downloadController = controller;
      const started = performance.now();
      try {
        const response = await fetch(target.download_url, {
          cache: "no-store",
          signal: controller.signal,
        });
        if (!response.ok || !response.body) {
          throw new Error(`下载请求失败: ${response.status}`);
        }

        const contentLength = Number(response.headers.get("content-length") || 0);
        const reader = response.body.getReader();

        while (true) {
          const { done, value } = await reader.read();
          const now = performance.now();
          const elapsed = now - started;
          if (elapsed >= state.test.download_test_ms) {
            await reader.cancel();
            break;
          }
          if (done) break;

          receivedBytes += value.length;
          if (now - lastTime >= 200) {
            const instantSpeed = ((receivedBytes - lastBytes) * 8) / ((now - lastTime) / 1000) / 1_000_000;
            smoothedSpeed = smoothedSpeed === 0
              ? instantSpeed
              : smoothedSpeed * (1 - SMOOTHING) + instantSpeed * SMOOTHING;
            speedSamples.push(smoothedSpeed);

            updateDownloadUi(targetKey, smoothedSpeed, receivedBytes, progressRatio(elapsed, receivedBytes, contentLength));
            lastTime = now;
            lastBytes = receivedBytes;
          }

          const progress = progressRatio(elapsed, receivedBytes, contentLength);
          if (!savePromise && progress >= state.test.progress_save_ratio) {
            savePromise = saveRunningResult(targetKey, stableSpeed(speedSamples));
          }
        }

        const finalSpeed = stableSpeed(speedSamples);
        updateDownloadUi(targetKey, finalSpeed, receivedBytes, 1);

        if (savePromise) {
          savedRecord = await savePromise.catch(() => null);
        }
        await finalizeResult(targetKey, finalSpeed, "completed", savedRecord).catch(() => null);
        markDownloadCompleted(targetKey, finalSpeed, receivedBytes);
      } catch (error) {
        const message = state.stopRequested
          ? "测速已停止"
          : error instanceof TypeError
          ? "下载失败：测速文件可能缺少跨域响应头"
          : error.message;
        updateDownloadMessage(targetKey, message);
        if (savePromise) {
          savedRecord = await savePromise.catch(() => null);
        }
        await finalizeResult(targetKey, stableSpeed(speedSamples), "failed", savedRecord).catch(() => null);
        markDownloadFailed(targetKey, stableSpeed(speedSamples), receivedBytes, message);
      } finally {
        controller.abort();
        state.isDownloading = false;
        state.activeTargetKey = null;
        state.downloadController = null;
        state.stopRequested = false;
        renderTargetList();
      }
    }

    function stopDownloadTest() {
      if (!state.downloadController) return;
      state.stopRequested = true;
      state.downloadController.abort();
    }

    async function saveRunningResult(targetKey, speed) {
      return saveResult(buildResultPayload(targetKey, speed, "running"));
    }

    async function finalizeResult(targetKey, speed, status, savedRecord) {
      const payload = buildResultPayload(targetKey, speed, status);
      if (savedRecord) {
        payload.id = savedRecord.id;
        payload.update_token = savedRecord.update_token;
      }
      await saveResult(payload);
    }

    async function saveResult(payload) {
      const response = await fetch("/api/results", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      if (!response.ok) {
        const error = await response.json().catch(() => ({ error: "保存失败" }));
        throw new Error(error.error || "保存失败");
      }
      return response.json();
    }

    function buildResultPayload(targetKey, speed, status) {
      const targetState = state.targetStates.get(targetKey);
      const stats = targetState?.stats || {
        median_ms: 0,
        min_ms: 0,
        max_ms: 0,
        samples_ms: [],
      };
      return {
        domain_key: targetKey,
        https_latency: stats,
        partial_download_mbps: status === "running" ? roundMetric(speed) : null,
        final_download_mbps: status !== "running" ? roundMetric(speed) : null,
        status,
        client_ip: state.currentClientIp || null,
        location: null,
        isp: null,
        colo: state.currentColos.get(targetKey) || null,
      };
    }

    async function openHistory() {
      toggleHistory(true);
      await loadHistory();
    }

    async function loadHistory() {
      els.historyBody.innerHTML = `<tr><td class="empty-row" colspan="6">加载中...</td></tr>`;
      const params = new URLSearchParams();
      if (els.historyDomain.value) params.set("domain", els.historyDomain.value);
      if (els.historyStatus.value) params.set("status", els.historyStatus.value);
      if (els.historyQuery.value.trim()) params.set("q", els.historyQuery.value.trim());
      params.set("limit", "80");

      try {
        const response = await fetch(`/api/results?${params.toString()}`, { cache: "no-store" });
        if (!response.ok) throw new Error("记录加载失败");
        const records = await response.json();
        if (!records.length) {
          els.historyBody.innerHTML = `<tr><td class="empty-row" colspan="6">暂无记录</td></tr>`;
          return;
        }
        els.historyBody.innerHTML = records.map(record => {
          const speed = record.final_download_mbps ?? record.partial_download_mbps ?? 0;
          return `<tr>
            <td>${formatTime(record.created_at)}</td>
            <td>
              <div class="history-domain-cell">
                <span class="history-domain-host">${escapeHtml(record.domain_host)}</span>
                <span class="history-domain-key">${escapeHtml(record.domain_key)}</span>
              </div>
            </td>
            <td class="col-latency">${formatLatency(record.https_latency_median_ms)}</td>
            <td>${renderHistoryStatus(record.status)}</td>
            <td class="col-ip">${escapeHtml(record.client_ip || "未知")}</td>
            <td class="col-speed">${speed.toFixed(1)} Mbps</td>
          </tr>`;
        }).join("");
      } catch (error) {
        els.historyBody.innerHTML = `<tr><td class="empty-row" colspan="6">${escapeHtml(error.message)}</td></tr>`;
      }
    }

    function renderTargetList() {
      const recommendedKey = findRecommendedTargetKey();
      const header = `<div class="target-list-header">
        <span>线路</span>
        <span style="text-align:right">HTTPS</span>
        <span style="text-align:right">下载</span>
        <span style="text-align:right">操作</span>
      </div>`;
      const rows = sortedTargetsForRender().map(target => {
        const targetState = state.targetStates.get(target.key);
        const stats = targetState?.stats;
        const isRecommended = target.key === recommendedKey;
        const isActive = state.activeTargetKey === target.key;
        const disabled = (state.isDownloading && !isActive) || targetState?.status === "failed";
        const buttonText = renderDownloadButtonText(targetState);
        const progress = renderDownloadProgress(targetState);
        return `<div class="target-row ${isRecommended ? "recommended" : ""} ${isActive ? "active" : ""}" data-target-key="${escapeHtml(target.key)}">
          <div class="target-row-progress" style="width:${progress}%"></div>
          <div>
            <div class="target-name">
              <span class="target-label-text">${escapeHtml(target.label)}</span>
              ${isRecommended ? `<span class="badge">推荐</span>` : ""}
              ${renderTargetStatus(targetState)}
            </div>
            <div class="target-host">
              <span class="target-host-text">${escapeHtml(target.host)}</span>
              ${renderColoBadge(target.key)}
            </div>
          </div>
          <div class="metric">
            <strong>${stats ? `${stats.median_ms.toFixed(0)} ms` : "-"}</strong>
            <span>${stats ? `min ${stats.min_ms.toFixed(0)} / ${stats.samples_ms.length} 次` : targetState?.error || "等待测试"}</span>
          </div>
          <div class="download-metric">
            <strong class="target-speed-value">${formatNodeSpeed(targetState)}</strong>
            <span class="target-download-status">${escapeHtml(renderDownloadStatusText(targetState))}</span>
          </div>
          <button class="btn-primary" type="button" onclick="startDownloadTest('${escapeHtml(target.key)}')" ${disabled ? "disabled" : ""}>${buttonText}</button>
        </div>`;
      }).join("");
      els.targetList.innerHTML = header + rows;
    }

    function renderDownloadProgress(targetState) {
      if (!targetState || targetState.downloadStatus === "idle") return 0;
      return Math.min(100, Math.max(0, targetState.downloadProgress * 100)).toFixed(1);
    }

    function renderColoBadge(targetKey) {
      const colo = state.currentColos.get(targetKey);
      if (!colo) return "";
      const color = colorForColo(colo);
      return `<span class="target-colo" style="--colo-bg:${color.bg};--colo-fg:${color.fg};--colo-ring:${color.ring}">${escapeHtml(colo)}</span>`;
    }

    function colorForColo(colo) {
      const key = String(colo || "").trim().toUpperCase();
      if (!key) return COLO_PALETTE[0];
      if (assignedColoColorIndexes.has(key)) {
        return COLO_PALETTE[assignedColoColorIndexes.get(key)];
      }

      const usedIndexes = new Set(assignedColoColorIndexes.values());
      const startIndex = hashString(key) % COLO_PALETTE.length;
      let colorIndex = startIndex;
      for (let offset = 0; offset < COLO_PALETTE.length; offset += 1) {
        const candidate = (startIndex + offset) % COLO_PALETTE.length;
        if (!usedIndexes.has(candidate)) {
          colorIndex = candidate;
          break;
        }
      }
      assignedColoColorIndexes.set(key, colorIndex);
      return COLO_PALETTE[colorIndex];
    }

    function hashString(value) {
      let hash = 2166136261;
      for (let index = 0; index < value.length; index += 1) {
        hash ^= value.charCodeAt(index);
        hash = Math.imul(hash, 16777619);
      }
      return hash >>> 0;
    }

    function renderDownloadButtonText(targetState) {
      if (!targetState || targetState.status === "failed") return "不可用";
      if (targetState.downloadStatus === "running") return "停止测速";
      if (targetState.downloadStatus === "completed") return "重新测速";
      if (targetState.downloadStatus === "failed") return "重试测速";
      return "开始测速";
    }

    function renderDownloadStateLabel(targetState) {
      if (!targetState) return "未测速";
      if (targetState.downloadStatus === "running") return "测速中";
      if (targetState.downloadStatus === "completed") return "已完成";
      if (targetState.downloadStatus === "failed") return "失败";
      return "未测速";
    }

    function renderDownloadStatusText(targetState) {
      if (!targetState || targetState.downloadStatus === "idle") return "未测速";
      if (targetState.downloadStatus === "running") return `${formatBytes(targetState.downloadedBytes)} · 测速中`;
      if (targetState.downloadStatus === "completed") return `${formatBytes(targetState.downloadedBytes)} · 已完成`;
      if (targetState.downloadStatus === "failed") {
        return targetState.downloadMessage ? targetState.downloadMessage : "失败";
      }
      return renderDownloadStateLabel(targetState);
    }

    function formatNodeSpeed(targetState) {
      if (!targetState || targetState.downloadSpeedMbps === null) return "-";
      return `${formatNodeSpeedValue(targetState)} Mbps`;
    }

    function formatNodeSpeedValue(targetState) {
      if (!targetState || targetState.downloadSpeedMbps === null) return "-";
      return targetState.downloadSpeedMbps.toFixed(1);
    }

    function formatBytes(bytes) {
      return `${((Number(bytes) || 0) / 1024 / 1024).toFixed(1)} MB`;
    }

    function renderTargetStatus(targetState) {
      if (!targetState) return "";
      if (targetState.status === "testing") return `<span class="badge">检测中</span>`;
      if (targetState.status === "failed") return `<span class="badge" style="color:var(--bad);background:rgba(201,72,72,.12)">失败</span>`;
      if (targetState.status === "ready") return `<span class="badge" style="color:var(--good);background:rgba(47,158,68,.12)">可测速</span>`;
      return "";
    }

    function renderHistoryDomainOptions() {
      els.historyDomain.innerHTML = `<option value="">全部域名</option>` + state.targets
        .map(target => `<option value="${escapeHtml(target.key)}">${escapeHtml(target.host)}</option>`)
        .join("");
    }

    function findRecommendedTargetKey() {
      const ready = state.targets
        .map(target => ({ key: target.key, stats: state.targetStates.get(target.key)?.stats }))
        .filter(item => item.stats);
      if (!ready.length) return null;
      ready.sort((a, b) => a.stats.median_ms - b.stats.median_ms);
      return ready[0].key;
    }

    function sortedTargetsForRender() {
      return state.targets
        .map((target, index) => ({
          target,
          index,
          state: state.targetStates.get(target.key),
        }))
        .sort((a, b) => {
          const aStats = a.state?.stats;
          const bStats = b.state?.stats;
          if (aStats && bStats) return aStats.median_ms - bStats.median_ms || a.index - b.index;
          if (aStats) return -1;
          if (bStats) return 1;
          return a.index - b.index;
        })
        .map(item => item.target);
    }

    function resetDownloadUi(targetKey) {
      const targetState = state.targetStates.get(targetKey);
      if (!targetState) return;
      targetState.downloadStatus = "running";
      targetState.downloadSpeedMbps = 0;
      targetState.downloadProgress = 0;
      targetState.downloadedBytes = 0;
      targetState.downloadMessage = "测速中...";
    }

    function findTargetRow(targetKey) {
      return Array.from(els.targetList.querySelectorAll(".target-row"))
        .find(row => row.dataset.targetKey === targetKey);
    }

    function patchDownloadRow(targetKey) {
      const targetState = state.targetStates.get(targetKey);
      const row = findTargetRow(targetKey);
      if (!targetState || !row) return false;

      const progress = row.querySelector(".target-row-progress");
      const speed = row.querySelector(".target-speed-value");
      const status = row.querySelector(".target-download-status");
      if (progress) progress.style.width = `${renderDownloadProgress(targetState)}%`;
      if (speed) speed.textContent = formatNodeSpeed(targetState);
      if (status) status.textContent = renderDownloadStatusText(targetState);
      return true;
    }

    function updateDownloadUi(targetKey, speed, bytes, progress) {
      const targetState = state.targetStates.get(targetKey);
      if (!targetState) return;
      targetState.downloadSpeedMbps = roundMetric(speed);
      targetState.downloadedBytes = bytes;
      targetState.downloadProgress = progress;
      if (!patchDownloadRow(targetKey)) renderTargetList();
    }

    function updateDownloadMessage(targetKey, message) {
      const targetState = state.targetStates.get(targetKey);
      if (!targetState) return;
      targetState.downloadMessage = message;
      if (!patchDownloadRow(targetKey)) renderTargetList();
    }

    function markDownloadCompleted(targetKey, speed, bytes) {
      const targetState = state.targetStates.get(targetKey);
      if (!targetState) return;
      targetState.downloadStatus = "completed";
      targetState.downloadSpeedMbps = roundMetric(speed);
      targetState.downloadedBytes = bytes;
      targetState.downloadProgress = 1;
      targetState.downloadMessage = "测速完成";
      renderTargetList();
    }

    function markDownloadFailed(targetKey, speed, bytes, message) {
      const targetState = state.targetStates.get(targetKey);
      if (!targetState) return;
      targetState.downloadStatus = "failed";
      targetState.downloadSpeedMbps = roundMetric(speed);
      targetState.downloadedBytes = bytes;
      targetState.downloadProgress = Math.max(targetState.downloadProgress, 0);
      targetState.downloadMessage = message;
      renderTargetList();
    }

    function updateClientInfo() {
      els.clientIp.textContent = state.currentClientIp || "待检测";
      els.clientLocation.textContent = "API 待接入";
      els.clientIsp.textContent = "API 待接入";
    }

    function parseTrace(text) {
      return text.trim().split("\n").reduce((acc, line) => {
        const index = line.indexOf("=");
        if (index > 0) {
          acc[line.slice(0, index)] = line.slice(index + 1);
        }
        return acc;
      }, {});
    }

    function summarizeLatency(samples) {
      const sorted = [...samples].sort((a, b) => a - b);
      return {
        median_ms: sorted[Math.floor(sorted.length / 2)],
        min_ms: sorted[0],
        max_ms: sorted[sorted.length - 1],
        samples_ms: samples.map(roundMetric),
      };
    }

    function stableSpeed(samples) {
      if (!samples.length) return 0;
      const sorted = [...samples].sort((a, b) => a - b);
      return sorted[Math.min(sorted.length - 1, Math.floor(sorted.length * 0.75))];
    }

    function progressRatio(elapsed, bytes, contentLength) {
      const timeRatio = elapsed / state.test.download_test_ms;
      const byteRatio = contentLength > 0 ? bytes / contentLength : 0;
      return Math.max(timeRatio, byteRatio);
    }

    function toggleHistory(show) {
      state.isHistoryOpen = show;
      els.historyModal.classList.toggle("active", show);
      els.historyModal.setAttribute("aria-hidden", String(!show));
      els.historyBtn.setAttribute("aria-expanded", String(show));
      document.body.classList.toggle("history-open", show);
      if (show) {
        window.requestAnimationFrame(() => els.historyModal.focus({ preventScroll: true }));
      } else {
        els.historyBtn.focus({ preventScroll: true });
      }
    }

    function formatLatency(value) {
      return typeof value === "number" ? `${value.toFixed(0)} ms` : "-";
    }

    function renderHistoryStatus(status) {
      return `<span class="history-status-pill ${historyStatusClass(status)}">${formatStatus(status)}</span>`;
    }

    function historyStatusClass(status) {
      const map = {
        running: "running",
        completed: "completed",
        failed: "failed",
      };
      return map[status] || "running";
    }

    function formatStatus(status) {
      const map = {
        running: "测速中",
        completed: "已完成",
        failed: "失败",
      };
      return map[status] || status;
    }

    function formatTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "-";
      return date.toLocaleString("zh-CN", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
      });
    }

    function roundMetric(value) {
      return Math.round((Number(value) || 0) * 10) / 10;
    }

    function sleep(ms) {
      return new Promise(resolve => window.setTimeout(resolve, ms));
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
