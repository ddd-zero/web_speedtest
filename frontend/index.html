<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>网络测速</title>
  <style>
    :root {
      --bg-color: #f5f2eb;
      --card-bg: #ffffff;
      --panel-bg: #fafafa;
      --text-main: #2d2d2d;
      --text-sub: #888888;
      --accent: #da7756;
      --accent-hover: #b86448;
      --good: #2f9e44;
      --warn: #d08b26;
      --bad: #c94848;
      --border: #e6e1da;
      --font-stack: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      --mono-stack: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      --number-stack: ui-monospace, "SFMono-Regular", Menlo, Monaco, "Cascadia Mono", "Segoe UI Mono", Consolas, "Liberation Mono", monospace;
    }

    html {
      min-height: 100%;
      scrollbar-gutter: stable;
    }

    body {
      height: 100dvh;
      margin: 0;
      padding: 22px;
      box-sizing: border-box;
      overflow-x: hidden;
      color: var(--text-main);
      background: var(--bg-color);
      font-family: var(--font-stack);
      -webkit-font-smoothing: antialiased;
    }

    body.history-open {
      overflow: hidden;
    }

    .layout {
      width: min(835px, 100%);
      height: 100%;
      min-height: 0;
      margin: 0 auto;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid rgba(230, 225, 218, .78);
      border-radius: 18px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 4%);
    }

    .main-card {
      display: flex;
      flex-direction: column;
      min-height: 0;
      height: 100%;
      box-sizing: border-box;
      padding: 20px;
    }

    h1 {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin: 0;
      font-size: 1.48rem;
      letter-spacing: 0;
      line-height: 1.25;
    }

    .version-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 2px 7px;
      border: 1px solid rgba(218, 119, 86, .24);
      border-radius: 999px;
      color: var(--accent);
      background: #fff4ed;
      font-size: .72rem;
      font-weight: 800;
      line-height: 1.35;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .subline {
      margin-top: 7px;
      color: var(--text-sub);
      font-size: .75rem;
      line-height: 1.45;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 16px;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      font-family: var(--font-stack);
      font-size: .92rem;
      font-weight: 700;
      cursor: pointer;
      /* 移动端系统高亮会与自定义按压态叠加，键盘焦点由 :focus-visible 单独处理。 */
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: transform .2s, background .2s, border-color .2s, color .2s, opacity .2s;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: .55;
      transform: none;
    }

    button:focus {
      outline: none;
    }

    body.keyboard-focus button:focus {
      outline: 3px solid rgba(218, 119, 86, .48);
      outline-offset: 3px;
    }

    body:not(.keyboard-focus) button:focus-visible {
      outline: none;
    }

    button.click-feedback:not(:disabled) {
      animation: buttonClickFeedback .16s ease-out;
    }

    .btn-primary {
      color: #fff;
      background: var(--accent);
      box-shadow: 0 4px 15px rgba(218, 119, 86, .24);
    }

    .btn-primary:hover:not(:disabled),
    .btn-primary:active:not(:disabled),
    .btn-primary.click-feedback:not(:disabled) {
      background: var(--accent-hover);
    }

    .btn-secondary {
      color: #555;
      background: #fff;
      border: 1px solid #ddd6ce;
    }

    .icon-btn {
      display: inline-grid;
      place-items: center;
      width: 42px;
      min-width: 42px;
      height: 42px;
      padding: 0;
      color: #665d57;
      background: #fff;
      border: 1px solid #ddd6ce;
      box-shadow: none;
      flex-shrink: 0;
    }

    .icon-btn svg {
      display: block;
      width: 18px;
      height: 18px;
    }

    .icon-btn:hover:not(:disabled),
    .icon-btn:active:not(:disabled),
    .icon-btn.click-feedback:not(:disabled) {
      color: var(--accent);
      background: #fff4ed;
      border-color: rgba(218, 119, 86, .36);
    }

    .privacy-toggle-btn[aria-pressed="true"] {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 4px 15px rgba(218, 119, 86, .24);
    }

    .privacy-toggle-btn .privacy-eye-off {
      display: none;
    }

    .privacy-toggle-btn[aria-pressed="true"] .privacy-eye {
      display: none;
    }

    .privacy-toggle-btn[aria-pressed="true"] .privacy-eye-off {
      display: block;
    }

    .history-fab {
      position: fixed;
      right: 20px;
      top: 65%;
      z-index: 90;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      min-width: 48px;
      max-width: 48px;
      min-height: 105px;
      box-sizing: border-box;
      padding: 14px 8px;
      border-radius: 999px;
      color: #fff;
      background: var(--accent);
      box-shadow: 0 14px 30px rgba(218, 119, 86, .32);
      line-height: 1.15;
      letter-spacing: 0;
      transform: translateY(-50%);
    }

    .history-fab-label {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      line-height: 1;
    }

    .history-fab-label span {
      display: block;
    }

    .history-fab:hover:not(:disabled),
    .history-fab:active:not(:disabled),
    .history-fab.click-feedback:not(:disabled) {
      background: var(--accent-hover);
      transform: translateY(-50%) translateX(-3px);
    }

    .info-group {
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 8px 16px;
      margin-bottom: 16px;
    }

    .info-row {
      display: grid;
      grid-template-columns: max-content minmax(0, 1fr);
      align-items: center;
      column-gap: 14px;
      padding: 10px 0;
      border-bottom: 1px dashed #e8e2dc;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .client-ip-row {
      column-gap: 10px;
    }

    .label {
      color: var(--text-sub);
      font-size: .83rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .value {
      justify-self: end;
      max-width: 100%;
      text-align: right;
      min-width: 0;
      overflow-wrap: anywhere;
      font-family: var(--mono-stack);
      font-size: .88rem;
      font-weight: 700;
      line-height: 1.4;
    }

    .client-ip-value-group {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      min-width: 0;
      max-width: 100%;
      justify-self: end;
    }

    .client-ip-value {
      max-width: 100%;
      min-width: 0;
      flex: 0 1 auto;
      white-space: nowrap;
      word-break: normal;
      overflow-wrap: normal;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 16px 0 10px;
      white-space: nowrap;
    }

    .client-ip-mismatch-alert {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 0;
      padding: 3px 8px;
      border: 1px solid rgba(201, 72, 72, .58);
      border-radius: 999px;
      color: var(--bad);
      background: rgba(201, 72, 72, .08);
      font-size: .65rem;
      font-weight: 800;
      line-height: 1.2;
      min-width: 0;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      width: fit-content;
      flex: 0 1 auto;
    }

    .client-ip-mismatch-alert[hidden] {
      display: none;
    }

    .section-title h2 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0;
    }

    .mini-status {
      min-height: 1.2em;
      color: var(--text-sub);
      font-size: .65rem;
      text-align: right;
    }

    .target-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      padding-right: 4px;
    }

    .target-list-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 90px 110px 92px;
      gap: 10px;
      align-items: center;
      margin-bottom: 6px;
      padding: 0 10px;
      color: var(--text-sub);
      font-size: .72rem;
      font-weight: 800;
      letter-spacing: 0;
    }

    .target-list-header,
    .target-row {
      flex: 0 0 auto;
    }

    .target-row {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 90px 110px 92px;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: #fffdf9;
    }

    .target-row> :not(.target-row-progress) {
      position: relative;
      z-index: 1;
    }

    .target-row-progress {
      position: absolute;
      inset: 0 auto 0 0;
      z-index: 0;
      width: 0%;
      pointer-events: none;
      background: rgba(218, 119, 86, .16);
      transition: width .14s ease;
    }

    .target-row.recommended {
      border-color: rgba(218, 119, 86, .55);
      box-shadow: 0 8px 22px rgba(218, 119, 86, .11);
    }

    .target-row.active {
      border-color: var(--accent);
      background: #fff7f1;
    }

    .target-name {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      overflow: hidden;
      font-weight: 800;
    }

    .target-label-text,
    .target-host-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .target-label-text {
      flex: 0 1 auto;
    }

    .target-host {
      display: grid;
      grid-template-columns: max-content minmax(0, max-content) minmax(0, 1fr) max-content;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      min-height: 17px;
      overflow: hidden;
      color: var(--text-sub);
      font-family: var(--mono-stack);
      font-size: .76rem;
      line-height: 1.15;
      word-break: break-all;
    }

    .target-host-text {
      grid-column: 1;
      max-width: 100%;
      line-height: 17px;
    }

    .target-colo {
      grid-column: 4;
      display: inline-flex;
      align-items: center;
      justify-self: end;
      box-sizing: border-box;
      width: max-content;
      min-height: 17px;
      border-radius: 999px;
      padding: 2px 7px;
      color: var(--colo-fg, #7a5546);
      background: var(--colo-bg, rgba(218, 119, 86, .13));
      box-shadow: inset 0 0 0 1px var(--colo-ring, rgba(218, 119, 86, .14));
      font-family: var(--mono-stack);
      font-size: .68rem;
      font-weight: 800;
      line-height: 1.15;
      white-space: nowrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 3px 8px;
      color: var(--accent);
      background: rgba(218, 119, 86, .12);
      font-size: .72rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .metric,
    .download-metric {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      gap: 2px;
      text-align: right;
      font-family: var(--number-stack);
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1;
      min-width: 0;
    }

    .download-metric {
      overflow: visible;
    }

    .metric strong,
    .target-speed-value {
      display: block;
      width: max-content;
      max-width: none;
      margin-left: auto;
      white-space: nowrap;
      overflow: visible;
      text-overflow: clip;
      color: var(--text-main);
      font-size: 1.06rem;
      font-weight: 850;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .target-speed-value {
      position: relative;
      z-index: 2;
      color: var(--accent);
    }

    .metric span,
    .target-download-status {
      display: block;
      width: max-content;
      max-width: 100%;
      margin-left: auto;
      text-align: right;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text-sub);
      line-height: 1.2;
      letter-spacing: 0;
    }

    .metric span {
      font-size: .7rem;
    }

    .target-download-status {
      font-size: .6rem;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
      background: rgba(45, 39, 35, .34);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition:
        opacity .2s ease,
        visibility 0s linear .2s;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition: opacity .18s ease;
    }

    .modal-overlay.is-leaving {
      opacity: 0;
      visibility: visible;
      pointer-events: none;
      transition: opacity .18s ease;
    }

    .modal-overlay.active .modal-content {
      opacity: 1;
      transform: scale(1);
    }

    .modal-overlay.is-entering .modal-content {
      animation: popIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28) both;
    }

    .modal-overlay.is-leaving .modal-content {
      animation: popOut .2s cubic-bezier(.4, 0, .2, 1) both;
    }

    .modal-overlay:focus {
      outline: none;
    }

    .modal-content {
      width: min(835px, calc(100vw - 48px));
      height: min(760px, calc(100dvh - 48px));
      box-sizing: border-box;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: #fff;
      border: 1px solid rgba(230, 225, 218, .9);
      border-radius: 18px;
      box-shadow: 0 24px 70px rgba(45, 39, 35, .22);
      opacity: 0;
      transform: scale(0.96);
      transform-origin: center;
      transition:
        opacity .16s ease,
        transform .18s cubic-bezier(.22, 1, .36, 1);
      will-change: transform, opacity;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes popOut {
      from {
        opacity: 1;
        transform: scale(1);
      }

      to {
        opacity: 0;
        transform: scale(0.96);
      }
    }

    .modal-header,
    .history-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #eee7df;
      background: #fff;
    }

    .modal-header {
      justify-content: space-between;
      padding: 18px 20px 16px;
    }

    .modal-title {
      margin: 0;
      font-size: 1.12rem;
      line-height: 1.2;
    }

    .history-subtitle {
      margin-top: 4px;
      color: var(--text-sub);
      font-size: .78rem;
    }

    .close-btn {
      display: inline-grid;
      place-items: center;
      width: 36px;
      height: 36px;
      padding: 0;
      border-radius: 50%;
      color: #777;
      background: #f7f3ee;
      border: 1px solid #eadfd7;
      font-size: 1.45rem;
      line-height: 1;
      transition:
        transform .16s ease,
        background .16s ease,
        border-color .16s ease,
        color .16s ease,
        box-shadow .16s ease;
    }

    .close-btn:hover:not(:disabled),
    .close-btn:active:not(:disabled),
    .close-btn.click-feedback:not(:disabled) {
      color: var(--accent);
      background: #fff4ed;
      border-color: rgba(218, 119, 86, .35);
      box-shadow: 0 8px 18px rgba(218, 119, 86, .16);
      transform: translateY(-1px) scale(1.03);
    }

    .close-btn:active:not(:disabled) {
      box-shadow: 0 4px 10px rgba(218, 119, 86, .16);
      transform: translateY(0) scale(0.94);
    }

    @keyframes buttonClickFeedback {
      0% {
        filter: brightness(.96);
      }

      45% {
        filter: brightness(.9);
      }

      100% {
        filter: brightness(1);
      }
    }

    .history-toolbar {
      margin: 0;
      display: grid;
      grid-template-columns: minmax(150px, 240px) minmax(220px, 1fr) auto auto;
      padding: 14px 20px;
      background: #fbfaf8;
    }

    .history-control-btn {
      white-space: nowrap;
    }

    .history-icon-btn {
      display: inline-grid;
      place-items: center;
      width: 42px;
      min-width: 42px;
      height: 42px;
      padding: 0;
    }

    .history-collapse-icon {
      width: 22px;
      height: 22px;
    }

    .history-control-btn[aria-pressed="true"] {
      color: var(--accent);
      background: #fff4ed;
      border-color: rgba(218, 119, 86, .38);
      box-shadow: 0 8px 18px rgba(218, 119, 86, .12);
    }

    .search-input,
    .search-select {
      min-width: 0;
      width: 100%;
      flex: 1;
      box-sizing: border-box;
      padding: 10px 12px;
      border: 1px solid #ddd6ce;
      border-radius: 10px;
      font-family: var(--font-stack);
      font-size: .9rem;
      background: #fff;
    }

    .search-select {
      appearance: none;
      padding-right: 36px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      background-color: #fff;
      background-image:
        linear-gradient(45deg, transparent 50%, #3f342e 50%),
        linear-gradient(135deg, #3f342e 50%, transparent 50%);
      background-position:
        calc(100% - 18px) 50%,
        calc(100% - 12px) 50%;
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
    }

    @media (max-width: 820px) and (min-width: 641px) {
      .history-toolbar {
        grid-template-columns: minmax(132px, 200px) minmax(0, 1fr) auto auto;
        gap: 8px;
        padding: 12px 14px;
      }

      .search-input,
      .search-select {
        padding: 9px 10px;
        font-size: .84rem;
      }

      .search-select {
        padding-right: 30px;
        background-position:
          calc(100% - 15px) 50%,
          calc(100% - 9px) 50%;
        background-size: 5px 5px, 5px 5px;
      }

      #query-history-btn {
        padding-inline: 12px;
      }
    }

    .table-container {
      flex: 1;
      overflow: auto;
      scrollbar-gutter: stable;
      background: #fff;
    }

    table {
      width: 100%;
      min-width: 100%;
      border-collapse: collapse;
      font-size: .84rem;
    }

    .history-table {
      --history-grid-columns: repeat(5, max-content);
      --history-time-gap: 6px;
      --history-time-marker-size: 14px;
      --history-time-columns: var(--history-time-marker-size) max-content max-content;
      width: max-content;
      min-width: 100%;
      display: grid;
      grid-template-columns: var(--history-grid-columns);
      justify-content: space-between;
      background: #fffdf9;
      border-collapse: separate;
      border-spacing: 0;
    }

    .history-table::before {
      content: "";
      grid-column: 1 / -1;
      grid-row: 1;
      position: sticky;
      top: 0;
      z-index: 1;
      align-self: stretch;
      background: #fffdf9;
      border-bottom: 1px solid #eee7df;
    }

    .history-table thead,
    .history-table tbody,
    .history-table tr {
      display: contents;
    }

    .history-table tr > :nth-child(1) {
      grid-column: 1;
    }

    .history-table tr > :nth-child(2) {
      grid-column: 2;
    }

    .history-table tr > :nth-child(3) {
      grid-column: 3;
    }

    .history-table tr > :nth-child(4) {
      grid-column: 4;
    }

    .history-table tr > :nth-child(5) {
      grid-column: 5;
    }

    .history-table thead tr > th {
      grid-row: 1;
      z-index: 2;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      padding: 12px 12px;
      border-bottom: none;
      color: #888;
      background: transparent;
      text-align: left;
      font-weight: 700;
      white-space: nowrap;
    }

    td {
      padding: 11px 12px;
      border-bottom: 1px solid #f3f0ec;
      color: #444;
      vertical-align: middle;
    }

    tr:hover td {
      background: #fffdf9;
    }

    .history-table th,
    .history-table td {
      padding: 8px;
    }

    .history-table th,
    .history-table td {
      box-sizing: border-box;
      display: flex;
      align-items: center;
      min-width: 0;
    }

    .history-table tbody td {
      min-height: 54px;
    }

    .history-table thead .col-time {
      padding-left: calc(8px + var(--history-time-marker-size) + var(--history-time-gap));
    }

    .history-table .col-domain,
    .history-table .col-network {
      padding-left: clamp(8px, 1.55vw, 14px);
    }

    .col-speed {
      color: var(--accent);
      font-family: var(--mono-stack);
      font-weight: 800;
      text-align: right;
      white-space: nowrap;
    }

    .col-time {
      font-family: var(--mono-stack);
      white-space: nowrap;
    }

    .history-time-cell {
      display: inline-grid;
      grid-template-columns: var(--history-time-columns);
      column-gap: var(--history-time-gap);
      align-items: center;
      min-width: max-content;
      line-height: 1.2;
    }

    .history-time-value {
      grid-column: 2;
    }

    .history-time-marker,
    .history-group-arrow {
      grid-column: 1;
      display: inline-grid;
      place-items: center;
      justify-self: center;
      width: var(--history-time-marker-size);
      height: var(--history-time-marker-size);
    }

    .history-time-marker-single {
      box-sizing: border-box;
      width: 8px;
      height: 8px;
      border: 2px solid rgba(218, 119, 86, .32);
      border-radius: 999px;
      background: #fffdf9;
      box-shadow: 0 0 0 2px rgba(218, 119, 86, .07);
    }

    .history-time-marker-child {
      width: 6px;
      height: 2px;
      border-radius: 999px;
      background: rgba(134, 146, 166, .42);
    }

    .col-speed-header {
      text-align: right;
    }

    .history-table .col-speed,
    .history-table .col-speed-header {
      justify-content: flex-end;
    }

    .history-speed-sort-btn {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 5px;
      margin: -3px -4px;
      padding: 3px 4px;
      border-radius: 8px;
      color: inherit;
      background: transparent;
      border: 1px solid transparent;
      box-shadow: none;
      font: inherit;
      line-height: 1.2;
      white-space: nowrap;
    }

    .history-speed-sort-btn:active:not(:disabled),
    .history-speed-sort-btn.click-feedback:not(:disabled) {
      color: var(--accent);
      background: #fff4ed;
      border-color: rgba(218, 119, 86, .22);
    }

    .history-speed-sort-btn[aria-pressed="true"] {
      color: var(--accent);
      background: #fff4ed;
      border-color: rgba(218, 119, 86, .22);
    }

    .history-sort-mark {
      width: 0;
      height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 6px solid currentColor;
      opacity: .36;
      transition: opacity .16s ease, transform .16s ease;
    }

    .history-speed-sort-btn[aria-pressed="true"] .history-sort-mark {
      opacity: 1;
      transform: translateY(1px);
    }

    .col-latency {
      font-family: var(--mono-stack);
      white-space: nowrap;
    }

    .history-latency-cell,
    .history-network-cell {
      display: grid;
      gap: 4px;
    }

    .history-latency-cell {
      min-width: max-content;
    }

    .history-network-cell {
      min-width: 0;
    }

    .history-latency-main,
    .history-network-ip {
      font-family: var(--mono-stack);
      font-weight: 800;
    }

    .history-network-ip {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-latency-main,
    .history-latency-jitter {
      overflow: visible;
      text-overflow: clip;
      white-space: nowrap;
    }

    .history-latency-jitter,
    .history-network-location {
      color: var(--text-sub);
      font-size: .76rem;
    }

    .history-network-location {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-network-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .history-network-location {
      min-width: 0;
    }

    .history-network-colo {
      flex: 0 0 auto;
    }

    .history-domain-cell {
      display: grid;
      gap: 4px;
      min-width: 0;
      width: 100%;
    }

    .history-domain-label,
    .history-domain-host {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-domain-label {
      font-weight: 700;
    }

    .history-domain-host {
      color: var(--text-sub);
      font-family: var(--mono-stack);
      font-size: .76rem;
    }

    .history-record-row {
      --history-row-bg: #fff;
      --history-row-hover-bg: #fffdf9;
      --history-row-border: #f3f0ec;
      --history-row-ring: transparent;
    }

    .history-single-row {
      --history-row-bg: #fffdfa;
      --history-row-hover-bg: #fff7f1;
      --history-row-border: #f1e9e1;
    }

    .history-single-row .history-time-value {
      color: #3f342e;
      font-weight: 700;
    }

    .history-table tbody .history-record-row::before {
      content: "";
      grid-column: 1 / -1;
      grid-row: var(--history-row);
      align-self: stretch;
      background: var(--history-row-bg);
      border-bottom: 1px solid var(--history-row-border);
      box-shadow: inset 0 0 0 1px var(--history-row-ring);
      pointer-events: auto;
      z-index: 0;
    }

    .history-table tbody .history-record-row > td {
      grid-row: var(--history-row);
      position: relative;
      z-index: 1;
      background: transparent;
      border-bottom: none;
    }

    .history-table tbody .history-measure-row::before {
      display: none;
    }

    .history-table tbody .history-measure-row > td {
      min-height: 0;
      height: 0;
      padding-top: 0;
      padding-bottom: 0;
      border-bottom: none;
      overflow: hidden;
      visibility: hidden;
      pointer-events: none;
    }

    .history-measure-stack {
      display: grid;
      height: 0;
      overflow: hidden;
      gap: 0;
      white-space: nowrap;
    }

    .history-group-row {
      --history-row-hover-bg: #fff4ed;
    }

    .history-group-row:active {
      --history-row-bg: #fff4ed;
      --history-row-border: rgba(218, 119, 86, .22);
      --history-row-ring: rgba(218, 119, 86, .22);
    }

    .history-group-row td {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    .history-group-toggle {
      display: inline-grid;
      grid-template-columns: var(--history-time-columns);
      column-gap: var(--history-time-gap);
      align-items: center;
      margin: -3px 0;
      padding: 4px 0;
      border-radius: 8px;
      color: inherit;
      background: transparent;
      border: none;
      box-shadow: none;
      font-family: var(--mono-stack);
      font-size: .78rem;
      line-height: 1.2;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    button.history-group-toggle:hover:not(:disabled) {
      transform: none;
    }

    button.history-group-toggle:active:not(:disabled) {
      transform: none;
    }

    .history-group-arrow {
      color: var(--accent);
      font-size: .76rem;
      line-height: 1;
      transition: transform .16s ease;
    }

    .history-group-toggle[aria-expanded="true"] .history-group-arrow {
      transform: rotate(90deg);
    }

    .history-group-count {
      display: inline-flex;
      grid-column: 3;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      padding: 0 6px;
      border-radius: 999px;
      color: var(--accent);
      background: #fff0e8;
      font-family: var(--font-stack);
      font-size: .68rem;
      font-weight: 800;
    }

    .history-child-row {
      --history-row-bg: #f3f4f6;
      --history-row-hover-bg: #eceff3;
    }

    .history-child-row .col-time {
      color: var(--text-sub);
    }

    .history-child-row .history-time-value {
      font-weight: 600;
    }

    @media (hover: hover) {

      .history-speed-sort-btn:hover:not(:disabled) {
        color: var(--accent);
        background: #fff4ed;
        border-color: rgba(218, 119, 86, .22);
      }

      .history-table tbody .history-record-row:hover,
      .history-table tbody .history-record-row:has(> td:hover) {
        --history-row-bg: var(--history-row-hover-bg);
      }

      .history-group-row:hover,
      .history-group-row:has(> td:hover) {
        --history-row-bg: #fff4ed;
        --history-row-border: rgba(218, 119, 86, .22);
        --history-row-ring: rgba(218, 119, 86, .22);
      }
    }

    .target-cname {
      display: inline-flex;
      align-items: center;
      grid-column: 2;
      justify-self: start;
      max-width: min(32ch, 100%);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border-radius: 999px;
      padding: 2px 7px;
      color: #506176;
      background: #f1f4f8;
      font-family: var(--mono-stack);
      font-size: .7rem;
      font-weight: 800;
    }

    .empty-row {
      padding: 26px;
      color: #999;
      text-align: center;
    }

    .history-table .empty-row {
      grid-column: 1 / -1;
    }

    @media (max-width: 640px) {
      html {
        scrollbar-gutter: auto;
      }

      body {
        padding: 14px;
      }

      .target-list-header {
        display: none;
      }

      .target-row {
        grid-template-columns: minmax(0, 1fr) minmax(82px, .8fr) 86px;
        gap: 6px 8px;
        align-items: stretch;
        padding: 8px;
      }

      .target-main {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, max-content);
        gap: 2px 8px;
        align-items: center;
        min-width: 0;
      }

      .target-name {
        grid-column: 1;
        grid-row: 1;
        gap: 6px;
      }

      .target-host {
        display: contents;
        font-size: .72rem;
      }

      .target-host-text {
        grid-column: 1;
        grid-row: 2;
      }

      .target-cname {
        grid-column: 2;
        grid-row: 1;
        justify-self: end;
        max-width: min(34vw, 168px);
        padding: 1px 6px;
        font-size: .58rem;
        line-height: 1.15;
      }

      .target-colo {
        grid-column: 2;
        grid-row: 2;
        justify-self: end;
      }

      .metric strong,
      .download-metric strong {
        font-size: .85rem;
        line-height: 1.15;
      }

      .target-row button {
        min-height: 38px;
        padding: 8px 10px;
      }

      .topbar {
        display: grid;
        grid-template-columns: 1fr;
      }

      .top-actions {
        width: 100%;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) 42px;
        align-items: stretch;
      }

      .client-ip-row {
        column-gap: 8px;
      }

      .client-ip-mismatch-alert {
        padding: 2px 6px;
        font-size: .6rem;
      }

      .top-actions button,
      .target-row button {
        width: 100%;
      }

      .top-actions .privacy-toggle-btn {
        width: 42px;
        min-width: 42px;
        height: auto;
        min-height: 42px;
      }

      .modal-overlay {
        padding: 0;
      }

      .modal-content {
        width: 100vw;
        height: 100dvh;
        border-radius: 0;
        border: none;
      }

      .history-toolbar {
        grid-template-columns: minmax(0, 1fr) 42px;
        gap: 8px;
        padding: 12px;
      }

      .history-toolbar .search-select,
      .history-toolbar .search-input {
        grid-column: 1 / -1;
      }

      #query-history-btn {
        grid-column: 1;
      }

      #history-collapse-toggle {
        grid-column: 2;
      }

      .history-toolbar button {
        width: 100%;
      }

      .history-toolbar .history-icon-btn {
        width: 42px;
        min-width: 42px;
        justify-self: end;
      }

      table {
        min-width: 680px;
      }

      .modal-header {
        padding: 14px 12px;
      }

      .metric {
        align-items: flex-start;
        text-align: left;
      }

      .metric strong,
      .metric span {
        margin-left: 0;
        margin-right: auto;
        text-align: left;
      }

      .download-metric {
        align-items: flex-end;
        text-align: right;
      }

      .target-speed-value,
      .target-download-status {
        margin-left: auto;
        margin-right: 0;
        text-align: right;
      }
    }

    @media (prefers-reduced-motion: reduce) {

      .modal-overlay,
      .modal-content {
        transition: none;
      }

      .modal-overlay.is-entering .modal-content,
      .modal-overlay.is-leaving .modal-content {
        animation: none;
      }

      .modal-overlay.active .modal-content {
        opacity: 1;
        transform: scale(1);
      }

      .modal-overlay.is-leaving .modal-content {
        opacity: 0;
        transform: scale(0.96);
      }
    }

  </style>
</head>

<body>
  <main class="layout">
    <section class="card main-card">
      <div class="topbar">
        <div>
          <h1>网络测速
            <span class="version-badge" aria-label="当前版本 __APP_VERSION__">v__APP_VERSION__</span>
          </h1>
          <div class="subline">自动检测HTTPS延迟，点击测试单线程下载测速</div>
        </div>
        <div class="top-actions">
          <button class="btn-primary" id="one-click-download-btn" type="button" disabled>一键测速</button>
          <button class="btn-secondary" id="refresh-latency-btn" type="button">重测延迟</button>
          <button class="icon-btn privacy-toggle-btn" id="privacy-toggle-btn" type="button" aria-label="开启隐私模式"
            aria-pressed="false">
            <svg class="privacy-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <svg class="privacy-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 3l18 18"></path>
              <path d="M10.6 10.6a2 2 0 0 0 2.8 2.8"></path>
              <path d="M9.9 4.2A10.7 10.7 0 0 1 12 4c6.5 0 10 8 10 8a18.2 18.2 0 0 1-3.1 4.3"></path>
              <path d="M6.1 6.1C3.5 7.8 2 12 2 12s3.5 8 10 8c1.5 0 2.9-.4 4.1-1"></path>
            </svg>
          </button>
        </div>
      </div>

      <div class="info-group">
        <div class="info-row client-ip-row">
          <span class="label">用户 IP</span>
          <span class="client-ip-value-group">
            <span class="client-ip-mismatch-alert" id="client-ip-mismatch-alert" hidden>IP异常，请检查分流</span>
            <span class="value client-ip-value" id="client-ip">正在检测</span>
          </span>
        </div>
        <div class="info-row">
          <span class="label">位置</span>
          <span class="value" id="client-location">正在检测</span>
        </div>
        <div class="info-row">
          <span class="label">运营商</span>
          <span class="value" id="client-isp">正在检测</span>
        </div>
      </div>

      <div class="section-title">
        <h2>线路测试</h2>
        <span class="mini-status" id="latency-status">准备中</span>
      </div>
      <div class="target-list" id="target-list"></div>
    </section>
  </main>

  <button class="history-fab" id="history-btn" type="button" aria-controls="history-modal" aria-expanded="false"
    aria-label="打开测速记录">
    <span class="history-fab-label" aria-hidden="true">
      <span>测</span>
      <span>速</span>
      <span>记</span>
      <span>录</span>
    </span>
  </button>

  <div class="modal-overlay" id="history-modal" role="dialog" aria-modal="true" aria-labelledby="history-title"
    aria-hidden="true" tabindex="-1">
    <div class="modal-content history-shell">
      <div class="modal-header">
        <div>
          <h2 class="modal-title" id="history-title">测速记录</h2>
          <div class="history-subtitle">按域名、IP、位置、运营商或节点查询最近测速结果</div>
        </div>
        <button class="close-btn" id="close-history-btn" type="button" aria-label="关闭">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <form class="history-toolbar" id="history-form">
        <select id="history-domain" class="search-select">
          <option value="">全部域名</option>
        </select>
        <input id="history-query" class="search-input" placeholder="搜索历史 空格分隔 IP 位置 运营商 节点">
        <button class="btn-primary" id="query-history-btn" type="submit">查询</button>
        <button class="btn-secondary history-control-btn history-icon-btn" id="history-collapse-toggle" type="button"
          aria-pressed="false" aria-label="折叠同 IP" title="折叠同 IP">
          <svg class="history-collapse-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="5" y="4.5" width="14" height="3" rx="1.3"></rect>
            <rect x="5" y="10.5" width="14" height="3" rx="1.3"></rect>
            <rect x="5" y="16.5" width="14" height="3" rx="1.3"></rect>
          </svg>
        </button>
      </form>
      <div class="table-container">
        <table class="history-table">
          <thead>
            <tr>
              <th class="col-time">时间</th>
              <th class="col-domain">域名</th>
              <th class="col-latency">HTTPS</th>
              <th class="col-speed-header" aria-sort="none">
                <button class="history-speed-sort-btn" id="history-speed-sort-btn" type="button" aria-pressed="false" aria-label="按下载速度从高到低排序">
                  <span>下载速度</span>
                  <span class="history-sort-mark" aria-hidden="true"></span>
                </button>
              </th>
              <th class="col-network">访问来源</th>
            </tr>
          </thead>
          <tbody id="history-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const SMOOTHING = 0.3;
    const IP_LOOKUP_URL = "https://myip.ipip.net/json";
    const CLIENT_META_URL = "/meta";
    const MAX_CONSECUTIVE_LATENCY_FAILURES = 3;
    const ONE_CLICK_DOWNLOAD_TEST_MS = 6000;
    const HISTORY_OPEN_ANIMATION_MS = 300;
    const HISTORY_CLOSE_ANIMATION_MS = 200;
    const BUTTON_CLICK_FEEDBACK_MS = 160;
    const HISTORY_COLLAPSE_STORAGE_KEY = "web-speed-history-collapse";
    const HISTORY_SPEED_SORT_STORAGE_KEY = "web-speed-history-speed-sort";
    const COLO_PALETTE = [
      { bg: "#eaf2ff", fg: "#205c9d", ring: "#c8ddfa" },
      { bg: "#e7f6f0", fg: "#1d6f57", ring: "#bfe7d7" },
      { bg: "#fff2cc", fg: "#8a5d00", ring: "#f4d98a" },
      { bg: "#fcecef", fg: "#a83f55", ring: "#f3c3ce" },
      { bg: "#eeeafd", fg: "#6750a4", ring: "#d8cff9" },
      { bg: "#e4f7fb", fg: "#147187", ring: "#b9e7f0" },
      { bg: "#fff0e6", fg: "#a04e20", ring: "#f3c7ad" },
      { bg: "#eaf7e8", fg: "#2f6f3e", ring: "#c8e8c1" },
      { bg: "#f3ecff", fg: "#7b4ab8", ring: "#ddcbfb" },
      { bg: "#e8f3f8", fg: "#315f7c", ring: "#c4ddea" },
      { bg: "#fff1f4", fg: "#93405d", ring: "#efc8d4" },
    ];
    const assignedColoColorIndexes = new Map();
    const clickFeedbackTimers = new WeakMap();
    let historyAnimationTimer = 0;

    const state = {
      targets: [],
      test: {
        latency_rounds: 5,
        latency_timeout_ms: 3500,
        download_test_ms: 8500,
        progress_save_ratio: 0.5,
      },
      history: {
        default_limit: 80,
        max_limit: 200,
      },
      historyRecords: [],
      historyCollapseEnabled: readHistoryPreference(HISTORY_COLLAPSE_STORAGE_KEY),
      historySpeedSortEnabled: readHistoryPreference(HISTORY_SPEED_SORT_STORAGE_KEY),
      expandedHistoryGroups: new Set(),
      display: {
        show_domains: true,
      },
      targetStates: new Map(),
      activeTargetKey: null,
      currentClientIp: "",
      currentIpInfo: {
        country: "",
        region: "",
        city: "",
        isp: "",
      },
      currentClientIpMismatch: false,
      currentColos: new Map(),
      isDownloading: false,
      isLatencyTesting: false,
      isOneClickDownloading: false,
      isHistoryOpen: false,
      isPrivacyMode: false,
      downloadController: null,
      stopRequested: false,
      oneClickStopRequested: false,
    };

    const els = {
      targetList: document.getElementById("target-list"),
      latencyStatus: document.getElementById("latency-status"),
      oneClickDownloadBtn: document.getElementById("one-click-download-btn"),
      refreshLatencyBtn: document.getElementById("refresh-latency-btn"),
      privacyBtn: document.getElementById("privacy-toggle-btn"),
      historyBtn: document.getElementById("history-btn"),
      historyModal: document.getElementById("history-modal"),
      closeHistoryBtn: document.getElementById("close-history-btn"),
      historyForm: document.getElementById("history-form"),
      historyDomain: document.getElementById("history-domain"),
      historyQuery: document.getElementById("history-query"),
      queryHistoryBtn: document.getElementById("query-history-btn"),
      historyCollapseToggle: document.getElementById("history-collapse-toggle"),
      historySpeedSortBtn: document.getElementById("history-speed-sort-btn"),
      historyBody: document.getElementById("history-body"),
      clientIp: document.getElementById("client-ip"),
      clientLocation: document.getElementById("client-location"),
      clientIsp: document.getElementById("client-isp"),
      clientIpMismatchAlert: document.getElementById("client-ip-mismatch-alert"),
    };

    window.addEventListener("DOMContentLoaded", init);

    document.addEventListener("keydown", event => {
      if (event.metaKey || event.ctrlKey || event.altKey) return;
      document.body.classList.toggle("keyboard-focus", true);
    }, true);

    ["pointerdown", "mousedown", "touchstart"].forEach(eventName => {
      document.addEventListener(eventName, () => {
        document.body.classList.toggle("keyboard-focus", false);
      }, true);
    });

    document.addEventListener("click", event => {
      const target = event.target;
      if (!(target instanceof Element)) return;
      const button = target.closest("button");
      if (!button) return;
      if (button.matches("[data-history-group-toggle]")) return;
      playButtonClickFeedback(button);
    }, true);

    els.oneClickDownloadBtn.addEventListener("click", runOneClickDownloadSequence);
    els.refreshLatencyBtn.addEventListener("click", () => runLatencyRounds());
    els.privacyBtn.addEventListener("click", togglePrivacyMode);
    els.historyBtn.addEventListener("click", openHistory);
    els.closeHistoryBtn.addEventListener("click", () => toggleHistory(false));
    els.historyModal.addEventListener("click", event => {
      if (event.target === els.historyModal) toggleHistory(false);
    });
    els.historyForm.addEventListener("submit", event => {
      event.preventDefault();
      loadHistory();
    });
    els.historyCollapseToggle.addEventListener("click", toggleHistoryCollapse);
    els.historySpeedSortBtn.addEventListener("click", toggleHistorySpeedSort);
    els.historyBody.addEventListener("click", event => {
      const target = event.target;
      if (!(target instanceof Element)) return;
      const toggle = target.closest("[data-history-group-toggle]");
      const row = target.closest("[data-history-group-row]");
      const groupKey = toggle?.dataset.historyGroupKey || row?.dataset.historyGroupKey;
      if (!groupKey || !row) return;
      toggleHistoryGroup(groupKey);
    });
    window.addEventListener("keydown", event => {
      if (event.key === "Escape" && state.isHistoryOpen) toggleHistory(false);
    });

    function togglePrivacyMode() {
      state.isPrivacyMode = !state.isPrivacyMode;
      els.privacyBtn.setAttribute("aria-pressed", String(state.isPrivacyMode));
      els.privacyBtn.setAttribute("aria-label", state.isPrivacyMode ? "关闭隐私模式" : "开启隐私模式");
      updateClientInfo();
      renderTargetList();
    }

    async function init() {
      syncHistoryPresentationControls();
      await Promise.all([loadConfig(), loadClientInfo()]);
      runLatencyRounds({ discardFirstRound: true });
    }

    async function loadConfig() {
      try {
        const response = await fetch("/api/config", { cache: "no-store" });
        if (!response.ok) throw new Error(`配置加载失败: ${response.status}`);
        const config = await response.json();
        state.targets = config.targets || [];
        state.test = {
          ...state.test,
          ...(config.test || {}),
        };
        state.history = {
          ...state.history,
          ...(config.history || {}),
        };
        state.display = {
          ...state.display,
          ...(config.display || {}),
        };
        state.targetStates = new Map(state.targets.map(target => [target.key, createTargetState()]));
        renderHistoryDomainOptions();
        renderTargetList();
        els.latencyStatus.textContent = renderLatencySummary();
      } catch (error) {
        els.targetList.innerHTML = `<div class="empty-row">${escapeHtml(error.message)}</div>`;
        els.latencyStatus.textContent = "配置加载失败";
      }
    }

    async function loadClientInfo() {
      try {
        const [publicInfo, metaInfo] = await Promise.all([
          fetchPublicIpInfo().catch(() => null),
          fetchClientMetaInfo().catch(() => null),
        ]);
        applyClientInfo(publicInfo, metaInfo);
      } catch (error) {
        state.currentClientIp = "";
        state.currentIpInfo = {
          country: "",
          region: "",
          city: "",
          isp: "",
        };
        state.currentClientIpMismatch = false;
      } finally {
        updateClientInfo();
      }
    }

    async function fetchPublicIpInfo() {
      const response = await fetch(IP_LOOKUP_URL, { cache: "no-store" });
      if (!response.ok) throw new Error(`IP 查询失败: ${response.status}`);
      const payload = await response.json();
      return parseIpLookupPayload(payload);
    }

    async function fetchClientMetaInfo() {
      const response = await fetch(CLIENT_META_URL, { cache: "no-store" });
      if (!response.ok) throw new Error(`Meta 查询失败: ${response.status}`);
      const payload = await response.json();
      return parseIpLookupPayload(payload);
    }

    function parseIpLookupPayload(payload) {
      const data = payload?.data || {};
      const location = Array.isArray(data.location) ? data.location : [];
      if (payload?.ret !== "ok" || !data.ip) throw new Error("IP 查询失败");

      return {
        ip: String(data.ip).trim(),
        info: {
          country: cleanText(location[0]),
          region: cleanText(location[1]),
          city: cleanText(location[2]),
          isp: cleanText(location[4]),
        },
        colo: cleanText(data.colo),
      };
    }

    function applyClientInfo(publicInfo, metaInfo) {
      const shouldUseMetaInfo = shouldUseClientMetaInfo(publicInfo?.ip, metaInfo?.ip);
      const shouldUseMetaIpWithPublicInfo = Boolean(publicInfo && metaInfo && isClientMetaChinaExit(metaInfo));
      state.currentClientIpMismatch = shouldUseMetaInfo && !shouldUseMetaIpWithPublicInfo;

      if (shouldUseMetaIpWithPublicInfo) {
        state.currentClientIp = metaInfo.ip;
        state.currentIpInfo = publicInfo.info;
        return;
      }

      if (shouldUseMetaInfo) {
        state.currentClientIp = metaInfo.ip;
        state.currentIpInfo = metaInfo.info;
        return;
      }

      if (publicInfo) {
        state.currentClientIp = publicInfo.ip;
        state.currentIpInfo = publicInfo.info;
        return;
      }

      if (metaInfo) {
        state.currentClientIp = metaInfo.ip;
        state.currentIpInfo = metaInfo.info;
        return;
      }

      state.currentClientIp = "";
      state.currentIpInfo = {
        country: "",
        region: "",
        city: "",
        isp: "",
      };
    }

    function createTargetState() {
      return {
        samples: [],
        stats: null,
        status: "waiting",
        error: "",
        consecutiveLatencyFailures: 0,
        latencySkipped: false,
        downloadStatus: "idle",
        downloadSpeedMbps: null,
        downloadProgress: 0,
        downloadedBytes: 0,
        downloadMessage: "",
      };
    }

    async function runLatencyRounds(options = {}) {
      if (!state.targets.length || state.isDownloading || state.isLatencyTesting || state.isOneClickDownloading) return;
      const discardFirstRound = Boolean(options.discardFirstRound);
      const totalRounds = state.test.latency_rounds + (discardFirstRound ? 1 : 0);
      state.isLatencyTesting = true;
      state.targetStates.forEach(targetState => {
        targetState.samples = [];
        targetState.stats = null;
        targetState.status = "testing";
        targetState.error = "";
        targetState.consecutiveLatencyFailures = 0;
        targetState.latencySkipped = false;
      });
      state.currentColos.clear();
      els.latencyStatus.textContent = renderLatencyProgress(0, discardFirstRound);
      renderTargetList();

      try {
        for (let round = 1; round <= totalRounds; round += 1) {
          const isWarmupRound = discardFirstRound && round === 1;
          await Promise.all(state.targets.map(async target => {
            const targetState = state.targetStates.get(target.key);
            if (!targetState || targetState.latencySkipped) return;

            const result = await measureHttpsLatency(target);
            if (result.ok) {
              targetState.consecutiveLatencyFailures = 0;
              if (!isWarmupRound) targetState.samples.push(result.ms);
              targetState.status = "testing";
              targetState.error = "";
              if (result.trace.colo) {
                state.currentColos.set(target.key, result.trace.colo);
                updateClientInfo();
              }
            } else if (isWarmupRound) {
              targetState.error = result.error;
            } else {
              targetState.consecutiveLatencyFailures += 1;
              if (targetState.consecutiveLatencyFailures >= MAX_CONSECUTIVE_LATENCY_FAILURES) {
                targetState.latencySkipped = true;
                targetState.status = targetState.samples.length ? "ready" : "failed";
                targetState.error = `连续失败 ${MAX_CONSECUTIVE_LATENCY_FAILURES} 次`;
                return;
              }
              targetState.error = `${result.error} ${targetState.consecutiveLatencyFailures}/${MAX_CONSECUTIVE_LATENCY_FAILURES}`;
            }
          }));

          state.targetStates.forEach(targetState => {
            if (targetState.samples.length) {
              targetState.stats = summarizeLatency(targetState.samples);
            }
          });
          els.latencyStatus.textContent = renderLatencyProgress(round, discardFirstRound);
          renderTargetList();
          if (round < totalRounds) await sleep(140);
        }

        state.targetStates.forEach(targetState => {
          targetState.status = targetState.samples.length ? "ready" : "failed";
        });
        els.latencyStatus.textContent = renderLatencySummary();
      } finally {
        state.isLatencyTesting = false;
        renderTargetList();
      }
    }

    function renderLatencyProgress(round, discardFirstRound = false) {
      if (discardFirstRound && round === 0) return `HTTPS 预热 · ${renderLatencySummary()}`;
      if (discardFirstRound && round === 1) return `HTTPS 预热完成 · ${renderLatencySummary()}`;
      const measuredRound = discardFirstRound ? Math.max(0, round - 1) : round;
      return `HTTPS 检测 ${measuredRound}/${state.test.latency_rounds} · ${renderLatencySummary()}`;
    }

    function renderLatencySummary() {
      const reachableCount = state.targets.filter(target => state.targetStates.get(target.key)?.samples.length).length;
      return `共 ${state.targets.length} 条线路，测试成功 ${reachableCount} 条`;
    }

    async function measureHttpsLatency(target) {
      const controller = new AbortController();
      const timer = window.setTimeout(() => controller.abort(), state.test.latency_timeout_ms);
      const started = performance.now();
      try {
        const response = await fetch(target.trace_url, {
          cache: "no-store",
          signal: controller.signal,
        });
        const text = await response.text();
        return {
          ok: true,
          ms: performance.now() - started,
          trace: parseTrace(text),
        };
      } catch (error) {
        return {
          ok: false,
          error: error.name === "AbortError" ? "请求超时" : "请求失败",
        };
      } finally {
        window.clearTimeout(timer);
      }
    }

    async function runOneClickDownloadSequence() {
      if (state.isOneClickDownloading) {
        state.oneClickStopRequested = true;
        stopDownloadTest();
        return;
      }
      if (state.isDownloading) return;

      const targets = oneClickDownloadTargets();
      if (!targets.length) return;

      state.isOneClickDownloading = true;
      state.oneClickStopRequested = false;
      syncTopActionButtons();
      renderTargetList();

      try {
        for (const target of targets) {
          if (state.oneClickStopRequested) break;
          await startDownloadTest(target.key, ONE_CLICK_DOWNLOAD_TEST_MS);
        }
      } finally {
        state.isOneClickDownloading = false;
        state.oneClickStopRequested = false;
        syncTopActionButtons();
        renderTargetList();
      }
    }

    async function startDownloadTest(targetKey, downloadTestMs = state.test.download_test_ms) {
      if (state.isDownloading && state.activeTargetKey === targetKey) {
        if (!state.isOneClickDownloading) stopDownloadTest();
        return;
      }
      if (state.isDownloading) return;
      const target = state.targets.find(item => item.key === targetKey);
      const targetState = state.targetStates.get(targetKey);
      if (!target || !canStartSingleDownload(targetState)) return;

      state.isDownloading = true;
      state.activeTargetKey = targetKey;
      state.stopRequested = false;
      let speedSamples = [];
      let smoothedSpeed = 0;
      let receivedBytes = 0;
      let lastBytes = 0;
      let lastTime = performance.now();
      let savePromise = null;
      let savedRecord = null;

      resetDownloadUi(targetKey);
      renderTargetList();

      const controller = new AbortController();
      state.downloadController = controller;
      const started = performance.now();
      try {
        const response = await fetch(target.download_url, {
          cache: "no-store",
          signal: controller.signal,
        });
        if (!response.ok || !response.body) {
          throw new Error(`下载请求失败: ${response.status}`);
        }

        const contentLength = Number(response.headers.get("content-length") || 0);
        const reader = response.body.getReader();

        while (true) {
          const { done, value } = await reader.read();
          const now = performance.now();
          const elapsed = now - started;
          if (elapsed >= downloadTestMs) {
            await reader.cancel();
            break;
          }
          if (done) break;

          receivedBytes += value.length;
          if (now - lastTime >= 200) {
            const instantSpeed = ((receivedBytes - lastBytes) * 8) / ((now - lastTime) / 1000) / 1_000_000;
            smoothedSpeed = smoothedSpeed === 0
              ? instantSpeed
              : smoothedSpeed * (1 - SMOOTHING) + instantSpeed * SMOOTHING;
            speedSamples.push(smoothedSpeed);

            updateDownloadUi(targetKey, smoothedSpeed, receivedBytes, progressRatio(elapsed, receivedBytes, contentLength, downloadTestMs));
            lastTime = now;
            lastBytes = receivedBytes;
          }

          const progress = progressRatio(elapsed, receivedBytes, contentLength, downloadTestMs);
          if (!savePromise && progress >= state.test.progress_save_ratio) {
            savePromise = saveProgressResult(targetKey, stableSpeed(speedSamples));
          }
        }

        const finalSpeed = stableSpeed(speedSamples);
        updateDownloadUi(targetKey, finalSpeed, receivedBytes, 1);

        if (savePromise) {
          savedRecord = await savePromise.catch(() => null);
        }
        await finalizeResult(targetKey, finalSpeed, savedRecord, Boolean(savePromise)).catch(() => null);
        markDownloadCompleted(targetKey, finalSpeed, receivedBytes);
      } catch (error) {
        const message = state.stopRequested
          ? "测速已停止"
          : error instanceof TypeError
            ? "下载失败：测速文件可能缺少跨域响应头"
            : error.message;
        updateDownloadMessage(targetKey, message);
        if (savePromise) {
          savedRecord = await savePromise.catch(() => null);
        }
        await finalizeResult(targetKey, stableSpeed(speedSamples), savedRecord, Boolean(savePromise)).catch(() => null);
        markDownloadFailed(targetKey, stableSpeed(speedSamples), receivedBytes, message);
      } finally {
        controller.abort();
        state.isDownloading = false;
        state.activeTargetKey = null;
        state.downloadController = null;
        state.stopRequested = false;
        renderTargetList();
      }
    }

    function stopDownloadTest() {
      if (!state.downloadController) return;
      state.stopRequested = true;
      state.downloadController.abort();
    }

    async function saveProgressResult(targetKey, speed) {
      return saveResult(buildResultPayload(targetKey, speed, false));
    }

    async function finalizeResult(targetKey, speed, savedRecord, progressSaveAttempted) {
      // 中段保存已发出但没拿到响应：服务端可能已经插入过这条记录，
      // 此时再 INSERT 会产生重复记录，因此直接跳过最终保存。
      if (progressSaveAttempted && !savedRecord) {
        return;
      }
      const payload = buildResultPayload(targetKey, speed, true);
      if (savedRecord) {
        payload.id = savedRecord.id;
        payload.update_token = savedRecord.update_token;
      }
      await saveResult(payload);
    }

    async function saveResult(payload) {
      const response = await fetch("/api/results", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      if (!response.ok) {
        const error = await response.json().catch(() => ({ error: "保存失败" }));
        throw new Error(error.error || "保存失败");
      }
      return response.json();
    }

    function buildResultPayload(targetKey, speed, isFinal) {
      const target = state.targets.find(item => item.key === targetKey);
      const targetState = state.targetStates.get(targetKey);
      const stats = targetState?.stats || {
        latency_ms: 0,
        jitter_ms: 0,
        samples_ms: [],
      };
      return {
        domain: target?.host || targetKey,
        https_latency_ms: roundMetric(stats.latency_ms),
        https_jitter_ms: roundMetric(stats.jitter_ms),
        download_mbps: roundMetric(speed),
        client_ip: state.currentClientIp || null,
        ip_country: state.currentIpInfo.country || null,
        ip_region: state.currentIpInfo.region || null,
        ip_city: state.currentIpInfo.city || null,
        ip_isp: state.currentIpInfo.isp || null,
        colo: state.currentColos.get(targetKey) || null,
      };
    }

    async function openHistory() {
      toggleHistory(true);
      await loadHistory();
    }

    async function loadHistory() {
      els.historyBody.innerHTML = `<tr><td class="empty-row" colspan="5">加载中...</td></tr>`;
      const params = new URLSearchParams();
      if (els.historyDomain.value) params.set("domain", els.historyDomain.value);
      if (els.historyQuery.value.trim()) params.set("q", els.historyQuery.value.trim());

      try {
        const response = await fetch(`/api/results?${params.toString()}`, { cache: "no-store" });
        if (!response.ok) throw new Error("记录加载失败");
        const records = await response.json();
        state.historyRecords = records;
        renderHistory();
      } catch (error) {
        state.historyRecords = [];
        els.historyBody.innerHTML = `<tr><td class="empty-row" colspan="5">${escapeHtml(error.message)}</td></tr>`;
      }
    }

    function renderHistory() {
      syncHistoryPresentationControls();
      if (!state.historyRecords.length) {
        els.historyBody.innerHTML = `<tr><td class="empty-row" colspan="5">暂无记录</td></tr>`;
        return;
      }

      els.historyBody.innerHTML = `${renderHistoryMeasureRow()}${historyRowsForRender().join("")}`;
    }

    function renderHistoryMeasureRow() {
      const measureStack = values => `<div class="history-measure-stack">${values.map(value => `<span>${escapeHtml(value)}</span>`).join("")}</div>`;
      return `<tr class="history-record-row history-measure-row" style="--history-row:2;" aria-hidden="true">
        <td class="col-time">${measureStack(state.historyRecords.map(record => formatTime(record.created_at)))}</td>
        <td class="col-domain">
          <div class="history-domain-cell history-measure-stack">
            ${state.historyRecords.map(record => `
              <span class="history-domain-label">${escapeHtml(historyTargetLabel(record))}</span>
              <span class="history-domain-host">${escapeHtml(historyTargetHost(record))}</span>
            `).join("")}
          </div>
        </td>
        <td class="col-latency">
          <div class="history-latency-cell history-measure-stack">
            ${state.historyRecords.map(record => `
              <span class="history-latency-main">${formatLatency(record.https_latency_ms)}</span>
              <span class="history-latency-jitter">抖动 ${formatLatency(record.https_jitter_ms)}</span>
            `).join("")}
          </div>
        </td>
        <td class="col-speed">${measureStack(state.historyRecords.map(record => `${historyDownloadSpeed(record).toFixed(1)} Mbps`))}</td>
        <td class="col-network">
          <div class="history-network-cell history-measure-stack">
            ${state.historyRecords.map(record => `
              <span class="history-network-ip">${escapeHtml(record.client_ip || "未知")}</span>
              <span class="history-network-meta">
                <span class="history-network-location">${escapeHtml(historyNetworkText(record) || "未知")}</span>
                <span class="target-colo history-network-colo">${escapeHtml(cleanText(record.colo))}</span>
              </span>
            `).join("")}
          </div>
        </td>
      </tr>`;
    }

    function historyRowsForRender() {
      const rows = [];
      const pushHistoryRow = (record, options = {}) => {
        rows.push(renderHistoryRecordRow(record, { ...options, rowIndex: rows.length + 3 }));
      };

      if (!state.historyCollapseEnabled) {
        sortHistoryRecordsBySpeed(state.historyRecords)
          .forEach(record => pushHistoryRow(record));
        return rows;
      }

      const groups = groupHistoryRecordsByClientIp(state.historyRecords);
      const sortedGroups = state.historySpeedSortEnabled ? sortHistoryGroupsBySpeed(groups) : groups;
      sortedGroups.forEach(group => {
        if (group.records.length <= 1) {
          pushHistoryRow(group.bestRecord);
          return;
        }

        const expanded = state.expandedHistoryGroups.has(group.key);
        pushHistoryRow(group.bestRecord, { group, expanded });
        if (expanded) {
          group.records.forEach(record => pushHistoryRow(record, { isChild: true }));
        }
      });
      return rows;
    }

    function renderHistoryRecordRow(record, options = {}) {
      const speed = historyDownloadSpeed(record);
      const rowClasses = ["history-record-row"];
      if (options.isChild) rowClasses.push("history-child-row");
      if (options.group) rowClasses.push("history-group-row");
      if (!options.isChild && !options.group) rowClasses.push("history-single-row");
      const groupAttrs = options.group ? ` data-history-group-row data-history-group-key="${escapeHtml(options.group.key)}" aria-expanded="${Boolean(options.expanded)}"` : "";
      return `<tr class="${rowClasses.join(" ")}" style="--history-row:${options.rowIndex};"${groupAttrs}>
        <td class="col-time">${renderHistoryTimeCell(record, options)}</td>
        <td class="col-domain">
          <div class="history-domain-cell">
            <span class="history-domain-label">${escapeHtml(historyTargetLabel(record))}</span>
            <span class="history-domain-host">${escapeHtml(historyTargetHost(record))}</span>
          </div>
        </td>
        <td class="col-latency">${renderHistoryLatency(record)}</td>
        <td class="col-speed">${speed.toFixed(1)} Mbps</td>
        <td class="col-network">${renderHistoryNetwork(record)}</td>
      </tr>`;
    }

    function renderHistoryTimeCell(record, options) {
      if (!options.group) {
        const markerClass = options.isChild ? "history-time-marker-child" : "history-time-marker-single";
        return `<span class="history-time-cell">
          <span class="history-time-marker ${markerClass}" aria-hidden="true"></span>
          <span class="history-time-value">${formatTime(record.created_at)}</span>
        </span>`;
      }

      const group = options.group;
      const expanded = Boolean(options.expanded);
      const label = expanded ? "收起" : "展开";
      return `<button class="history-group-toggle" type="button" data-history-group-toggle data-history-group-key="${escapeHtml(group.key)}" aria-expanded="${expanded}" aria-label="${label} ${escapeHtml(group.key)} 的 ${group.records.length} 条测速记录">
        <span class="history-group-arrow" aria-hidden="true">›</span>
        <span class="history-time-value">${formatTime(record.created_at)}</span>
        <span class="history-group-count">${group.records.length}</span>
      </button>`;
    }

    function groupHistoryRecordsByClientIp(records) {
      const grouped = new Map();
      records.forEach(record => {
        const key = historyClientGroupKey(record);
        if (!grouped.has(key)) grouped.set(key, []);
        grouped.get(key).push(record);
      });

      return Array.from(grouped.entries()).map(([key, groupRecords]) => ({
        key,
        records: sortHistoryRecordsBySpeed(groupRecords),
        bestRecord: bestHistoryRecord(groupRecords),
      }));
    }

    function bestHistoryRecord(records) {
      return records.reduce((best, record) => (
        historyDownloadSpeed(record) > historyDownloadSpeed(best) ? record : best
      ), records[0]);
    }

    function sortHistoryRecordsBySpeed(records) {
      if (!state.historySpeedSortEnabled) return [...records];
      return records
        .map((record, index) => ({ record, index }))
        .sort((a, b) => historyDownloadSpeed(b.record) - historyDownloadSpeed(a.record) || a.index - b.index)
        .map(item => item.record);
    }

    function sortHistoryGroupsBySpeed(groups) {
      return groups
        .map((group, index) => ({ group, index }))
        .sort((a, b) => historyDownloadSpeed(b.group.bestRecord) - historyDownloadSpeed(a.group.bestRecord) || a.index - b.index)
        .map(item => item.group);
    }

    function historyDownloadSpeed(record) {
      const speed = Number(record?.download_mbps);
      return Number.isFinite(speed) ? speed : 0;
    }

    function historyClientGroupKey(record) {
      return cleanText(record?.client_ip) || "未知";
    }

    function toggleHistoryCollapse() {
      state.historyCollapseEnabled = !state.historyCollapseEnabled;
      if (!state.historyCollapseEnabled) state.expandedHistoryGroups.clear();
      writeHistoryPreference(HISTORY_COLLAPSE_STORAGE_KEY, state.historyCollapseEnabled);
      renderHistory();
    }

    function toggleHistorySpeedSort() {
      state.historySpeedSortEnabled = !state.historySpeedSortEnabled;
      writeHistoryPreference(HISTORY_SPEED_SORT_STORAGE_KEY, state.historySpeedSortEnabled);
      renderHistory();
    }

    function toggleHistoryGroup(groupKey) {
      if (!groupKey) return;
      if (state.expandedHistoryGroups.has(groupKey)) {
        state.expandedHistoryGroups.delete(groupKey);
      } else {
        state.expandedHistoryGroups.add(groupKey);
      }
      renderHistory();
    }

    function syncHistoryPresentationControls() {
      const historyCollapseLabel = state.historyCollapseEnabled ? "取消折叠同 IP" : "折叠同 IP";
      els.historyCollapseToggle.setAttribute("aria-pressed", String(state.historyCollapseEnabled));
      els.historyCollapseToggle.setAttribute("aria-label", historyCollapseLabel);
      els.historyCollapseToggle.setAttribute("title", historyCollapseLabel);
      els.historySpeedSortBtn.setAttribute("aria-pressed", String(state.historySpeedSortEnabled));
      els.historySpeedSortBtn.setAttribute("aria-label", state.historySpeedSortEnabled ? "取消下载速度排序" : "按下载速度从高到低排序");
      els.historySpeedSortBtn.parentElement?.setAttribute("aria-sort", state.historySpeedSortEnabled ? "descending" : "none");
    }

    function renderTargetList() {
      const recommendedKey = findRecommendedTargetKey();
      const header = `<div class="target-list-header">
        <span>线路</span>
        <span style="text-align:right">HTTPS</span>
        <span style="text-align:right">下载</span>
        <span style="text-align:right">操作</span>
      </div>`;
      const rows = sortedTargetsForRender().map(target => {
        const targetState = state.targetStates.get(target.key);
        const stats = targetState?.stats;
        const isRecommended = target.key === recommendedKey;
        const isActive = state.activeTargetKey === target.key;
        const disabled = state.isOneClickDownloading || (state.isDownloading && !isActive) || !canStartSingleDownload(targetState);
        const buttonText = renderDownloadButtonText(targetState);
        const progress = renderDownloadProgress(targetState);
        return `<div class="target-row ${isRecommended ? "recommended" : ""} ${isActive ? "active" : ""}" data-target-key="${escapeHtml(target.key)}">
          <div class="target-row-progress" style="width:${progress}%"></div>
          <div class="target-main">
            <div class="target-name">
              <span class="target-label-text">${escapeHtml(formatTargetLabelForDisplay(target))}</span>
              ${isRecommended ? `<span class="badge">推荐</span>` : ""}
              ${renderTargetStatus(targetState)}
            </div>
            <div class="target-host">
              <span class="target-host-text">${escapeHtml(formatTargetHostForDisplay(target.host))}</span>
              ${renderCnameBadge(target.cname)}
              ${renderColoBadge(target.key)}
            </div>
          </div>
          <div class="metric">
            <strong>${stats ? `${stats.latency_ms.toFixed(0)} ms` : "-"}</strong>
            <span>${stats ? `抖动 ${stats.jitter_ms.toFixed(0)} ms` : targetState?.error || "等待测试"}</span>
          </div>
          <div class="download-metric">
            <strong class="target-speed-value">${formatNodeSpeed(targetState)}</strong>
            <span class="target-download-status">${escapeHtml(renderDownloadStatusText(targetState))}</span>
          </div>
          <button class="btn-primary" type="button" onclick="startDownloadTest('${escapeHtml(target.key)}')" ${disabled ? "disabled" : ""}>${buttonText}</button>
        </div>`;
      }).join("");
      els.targetList.innerHTML = header + rows;
      syncTopActionButtons();
    }

    function renderDownloadProgress(targetState) {
      if (!targetState || targetState.downloadStatus === "idle") return 0;
      return Math.min(100, Math.max(0, targetState.downloadProgress * 100)).toFixed(1);
    }

    function renderColoBadge(targetKey) {
      const colo = state.currentColos.get(targetKey);
      if (!colo) return "";
      const color = colorForColo(colo);
      return `<span class="target-colo" style="--colo-bg:${color.bg};--colo-fg:${color.fg};--colo-ring:${color.ring}">${escapeHtml(colo)}</span>`;
    }

    function renderCnameBadge(cname) {
      if (!shouldShowDomains()) return "";
      if (!cname || cname === "-") return "";
      const displayCname = cleanText(cname);
      return `<span class="target-cname" title="${escapeHtml(displayCname)}" aria-label="CNAME ${escapeHtml(displayCname)}">${escapeHtml(displayCname)}</span>`;
    }

    function colorForColo(colo) {
      const key = String(colo || "").trim().toUpperCase();
      if (!key) return COLO_PALETTE[0];
      if (assignedColoColorIndexes.has(key)) {
        return COLO_PALETTE[assignedColoColorIndexes.get(key)];
      }

      const colorIndex = randomColoPaletteIndex();
      assignedColoColorIndexes.set(key, colorIndex);
      return COLO_PALETTE[colorIndex];
    }

    function randomColoPaletteIndex() {
      const usedIndexes = new Set(assignedColoColorIndexes.values());
      const availableIndexes = COLO_PALETTE
        .map((_, index) => index)
        .filter(index => !usedIndexes.has(index));
      const pool = availableIndexes.length ? availableIndexes : COLO_PALETTE.map((_, index) => index);
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function renderDownloadButtonText(targetState) {
      if (!targetState || targetState.status === "failed") return "不可用";
      if (targetState.downloadStatus === "running") return "停止测速";
      if (targetState.downloadStatus === "completed") return "重新测速";
      if (targetState.downloadStatus === "failed") return "重试测速";
      return "开始测速";
    }

    function renderDownloadStatusText(targetState) {
      if (!targetState || targetState.downloadStatus === "idle") return "未测速";
      if (targetState.downloadStatus === "running") return `${formatBytes(targetState.downloadedBytes)} 测速中`;
      if (targetState.downloadStatus === "completed") return `${formatBytes(targetState.downloadedBytes)} 已完成`;
      if (targetState.downloadStatus === "failed") {
        return targetState.downloadMessage ? targetState.downloadMessage : "失败";
      }
      return "未测速";
    }

    function formatNodeSpeed(targetState) {
      if (!targetState || targetState.downloadSpeedMbps === null) return "-";
      return `${formatNodeSpeedValue(targetState)} Mbps`;
    }

    function formatNodeSpeedValue(targetState) {
      if (!targetState || targetState.downloadSpeedMbps === null) return "-";
      return targetState.downloadSpeedMbps.toFixed(1);
    }

    function formatBytes(bytes) {
      return `${((Number(bytes) || 0) / 1024 / 1024).toFixed(1)} MB`;
    }

    function renderTargetStatus(targetState) {
      if (!targetState) return "";
      if (targetState.status === "testing") return `<span class="badge">检测中</span>`;
      if (targetState.status === "failed") return `<span class="badge" style="color:var(--bad);background:rgba(201,72,72,.12)">失败</span>`;
      if (targetState.status === "ready") return `<span class="badge" style="color:var(--good);background:rgba(47,158,68,.12)">可测速</span>`;
      return "";
    }

    function renderHistoryDomainOptions() {
      els.historyDomain.disabled = false;
      const defaultLabel = shouldShowDomains() ? "全部域名" : "全部线路";
      els.historyDomain.innerHTML = `<option value="">${defaultLabel}</option>` + state.targets
        .map((target, index) => `<option value="${escapeHtml(target.host)}">${escapeHtml(historyDomainOptionLabel(target, index))}</option>`)
        .join("");
    }

    function historyDomainOptionLabel(target, index) {
      const host = cleanText(target?.host);
      let label = cleanText(target?.label);
      const fallbackLabel = `线路 ${index + 1}`;
      if (!label || (!shouldShowDomains() && looksLikeDomainLabel(label, host))) {
        label = fallbackLabel;
      }
      return shouldShowDomains() ? `${label} / ${host}` : label;
    }

    function historyTargetLabel(record) {
      const target = historyTargetForRecord(record);
      return formatHistoryTargetLabelForDisplay(target, record);
    }

    function formatHistoryTargetLabelForDisplay(target, record) {
      const label = cleanText(target?.label || record.domain || "未知域名");
      if (!shouldShowDomains() && looksLikeDomainLabel(label, target?.host || record?.domain)) {
        return hiddenDomainText();
      }
      return label;
    }

    function historyTargetHost(record) {
      if (!shouldShowDomains()) return hiddenDomainText();
      const target = historyTargetForRecord(record);
      return target?.host || record.domain || "未知域名";
    }

    function historyTargetForRecord(record) {
      return state.targets.find(target => target.host === record.domain) || null;
    }

    function renderHistoryLatency(record) {
      return `<div class="history-latency-cell">
        <span class="history-latency-main">${formatLatency(record.https_latency_ms)}</span>
        <span class="history-latency-jitter">抖动 ${formatLatency(record.https_jitter_ms)}</span>
      </div>`;
    }

    function renderHistoryNetwork(record) {
      const networkText = historyNetworkText(record);
      return `<div class="history-network-cell">
        <span class="history-network-ip">${escapeHtml(record.client_ip || "未知")}</span>
        <span class="history-network-meta">
          <span class="history-network-location">${escapeHtml(networkText || "未知")}</span>
          ${renderHistoryColoBadge(record)}
        </span>
      </div>`;
    }

    function historyNetworkText(record) {
      const location = [record.ip_country, record.ip_region, record.ip_city]
        .map(cleanText)
        .filter(Boolean)
        .join(" ");
      const isp = cleanText(record.ip_isp);
      return location && isp ? `${location} · ${isp}` : location || isp;
    }

    function renderHistoryColoBadge(record) {
      const colo = cleanText(record.colo);
      if (!colo) return "";
      const color = colorForColo(colo);
      return `<span class="target-colo history-network-colo" style="--colo-bg:${color.bg};--colo-fg:${color.fg};--colo-ring:${color.ring}">${escapeHtml(colo)}</span>`;
    }

    function findRecommendedTargetKey() {
      const ready = state.targets
        .map(target => ({ key: target.key, stats: state.targetStates.get(target.key)?.stats }))
        .filter(item => item.stats);
      if (!ready.length) return null;
      ready.sort((a, b) => a.stats.latency_ms - b.stats.latency_ms);
      return ready[0].key;
    }

    function sortedTargetsForRender() {
      return state.targets
        .map((target, index) => ({
          target,
