          index,
          state: state.targetStates.get(target.key),
        }))
        .sort((a, b) => {
          const aStats = a.state?.stats;
          const bStats = b.state?.stats;
          if (aStats && bStats) return aStats.latency_ms - bStats.latency_ms || a.index - b.index;
          if (aStats) return -1;
          if (bStats) return 1;
          return a.index - b.index;
        })
        .map(item => item.target);
    }

    function oneClickDownloadTargets() {
      return sortedTargetsForRender().filter(target => {
        const targetState = state.targetStates.get(target.key);
        return canStartSingleDownload(targetState) && targetState.status === "ready";
      });
    }

    function canStartSingleDownload(targetState) {
      return Boolean(targetState?.stats && targetState.samples.length > 0 && targetState.status !== "failed");
    }

    function syncTopActionButtons() {
      const canRunOneClick = state.isOneClickDownloading || (!state.isLatencyTesting && oneClickDownloadTargets().length > 0);
      els.oneClickDownloadBtn.textContent = state.isOneClickDownloading ? "停止测速" : "一键测速";
      els.oneClickDownloadBtn.disabled = !canRunOneClick || (state.isDownloading && !state.isOneClickDownloading);
      els.refreshLatencyBtn.disabled = state.isDownloading || state.isOneClickDownloading;
    }

    function resetDownloadUi(targetKey) {
      const targetState = state.targetStates.get(targetKey);
      if (!targetState) return;
      targetState.downloadStatus = "running";
      targetState.downloadSpeedMbps = 0;
      targetState.downloadProgress = 0;
      targetState.downloadedBytes = 0;
      targetState.downloadMessage = "测速中...";
    }

    function findTargetRow(targetKey) {
      return Array.from(els.targetList.querySelectorAll(".target-row"))
        .find(row => row.dataset.targetKey === targetKey);
    }

    function patchDownloadRow(targetKey) {
      const targetState = state.targetStates.get(targetKey);
      const row = findTargetRow(targetKey);
      if (!targetState || !row) return false;

      const progress = row.querySelector(".target-row-progress");
      const speed = row.querySelector(".target-speed-value");
      const status = row.querySelector(".target-download-status");
      if (progress) progress.style.width = `${renderDownloadProgress(targetState)}%`;
      if (speed) speed.textContent = formatNodeSpeed(targetState);
      if (status) status.textContent = renderDownloadStatusText(targetState);
      return true;
    }

    function updateDownloadUi(targetKey, speed, bytes, progress) {
      const targetState = state.targetStates.get(targetKey);
      if (!targetState) return;
      targetState.downloadSpeedMbps = roundMetric(speed);
      targetState.downloadedBytes = bytes;
      targetState.downloadProgress = progress;
      if (!patchDownloadRow(targetKey)) renderTargetList();
    }

    function updateDownloadMessage(targetKey, message) {
      const targetState = state.targetStates.get(targetKey);
      if (!targetState) return;
      targetState.downloadMessage = message;
      if (!patchDownloadRow(targetKey)) renderTargetList();
    }

    function markDownloadCompleted(targetKey, speed, bytes) {
      const targetState = state.targetStates.get(targetKey);
      if (!targetState) return;
      targetState.downloadStatus = "completed";
      targetState.downloadSpeedMbps = roundMetric(speed);
      targetState.downloadedBytes = bytes;
      targetState.downloadProgress = 1;
      targetState.downloadMessage = "测速完成";
      renderTargetList();
    }

    function markDownloadFailed(targetKey, speed, bytes, message) {
      const targetState = state.targetStates.get(targetKey);
      if (!targetState) return;
      targetState.downloadStatus = "failed";
      targetState.downloadSpeedMbps = roundMetric(speed);
      targetState.downloadedBytes = bytes;
      targetState.downloadProgress = Math.max(targetState.downloadProgress, 0);
      targetState.downloadMessage = message;
      renderTargetList();
    }

    function updateClientInfo() {
      els.clientIp.textContent = formatClientIpForDisplay(state.currentClientIp);
      els.clientLocation.textContent = formatClientLocationForDisplay();
      els.clientIsp.textContent = state.currentIpInfo.isp || "未知";
      updateClientIpMismatchAlert();
    }

    function updateClientIpMismatchAlert() {
      els.clientIpMismatchAlert.hidden = !state.currentClientIpMismatch;
    }

    // 隐私模式只替换展示文本，state 中的真实数据仍用于测速和保存结果。
    function formatClientIpForDisplay(value) {
      const ip = cleanText(value);
      if (!ip) return "待检测";
      return state.isPrivacyMode ? maskIpForPrivacy(ip) : ip;
    }

    function formatClientLocationForDisplay() {
      const parts = [state.currentIpInfo.country, state.currentIpInfo.region, state.currentIpInfo.city]
        .map(cleanText)
        .filter(Boolean);
      if (!parts.length) return "未知";
      return state.isPrivacyMode ? maskClientLocationForPrivacy(parts) : parts.join(" ");
    }

    function maskClientLocationForPrivacy(parts) {
      const locationParts = parts.map(cleanText).filter(Boolean);
      if (!locationParts.length) return "未知";
      return [...locationParts.slice(0, -1), "***"].join(" ");
    }

    function maskIpForPrivacy(value) {
      const ip = cleanText(value);
      if (!ip) return "";
      const dottedMapped = ip.match(/^::ffff:(\d{1,3}(?:\.\d{1,3}){3})$/i);
      if (dottedMapped) return maskIpv4ForPrivacy(dottedMapped[1]);
      const mappedIpv4 = ipv6MappedIpv4ForPrivacy(ip);
      if (mappedIpv4) return maskIpv4ForPrivacy(mappedIpv4);
      if (ip.includes(":")) return maskIpv6ForPrivacy(ip);
      if (ip.includes(".")) return maskIpv4ForPrivacy(ip);
      return ip;
    }

    function shouldUseClientMetaInfo(publicIp, metaIp) {
      const publicPrefix = ipv4PrefixForComparison(publicIp);
      const metaPrefix = ipv4PrefixForComparison(metaIp);
      return Boolean(publicPrefix && metaPrefix && publicPrefix !== metaPrefix);
    }

    function isClientMetaChinaExit(metaInfo) {
      const country = cleanText(metaInfo?.info?.country).toLowerCase();
      const isp = cleanText(metaInfo?.info?.isp).toLowerCase();
      return country === "cn" || country === "china" || isp.includes("china");
    }

    function ipv4PrefixForComparison(value) {
      const parts = cleanText(value).split(".");
      if (parts.length !== 4 || parts.some(part => !/^\d{1,3}$/.test(part))) return "";
      if (parts.some(part => Number(part) > 255)) return "";
      return parts.slice(0, 2).join(".");
    }

    function maskIpv4ForPrivacy(value) {
      const parts = cleanText(value).split(".");
      if (parts.length !== 4 || parts.some(part => !/^\d{1,3}$/.test(part))) return value;
      if (parts.some(part => Number(part) > 255)) return value;
      return `${parts[0]}.${parts[1]}.*.*`;
    }

    function maskIpv6ForPrivacy(value) {
      const segments = expandIpv6Segments(value);
      if (!segments) return value;
      return `${Number.parseInt(segments[0], 16).toString(16)}:${Number.parseInt(segments[1], 16).toString(16)}:${Number.parseInt(segments[2], 16).toString(16)}::*`;
    }

    function ipv6MappedIpv4ForPrivacy(value) {
      const segments = expandIpv6Segments(value);
      if (!segments) return null;
      const prefixIsMapped = segments
        .slice(0, 5)
        .every(segment => Number.parseInt(segment, 16) === 0)
        && Number.parseInt(segments[5], 16) === 0xffff;
      if (!prefixIsMapped) return null;

      const high = Number.parseInt(segments[6], 16);
      const low = Number.parseInt(segments[7], 16);
      return `${high >> 8}.${high & 255}.${low >> 8}.${low & 255}`;
    }

    function expandIpv6Segments(value) {
      const input = cleanText(value).toLowerCase();
      if (!input.includes(":") || input.includes(".")) return null;
      const compressedParts = input.split("::");
      if (compressedParts.length > 2) return null;

      const left = compressedParts[0] ? compressedParts[0].split(":") : [];
      const right = compressedParts.length === 2 && compressedParts[1] ? compressedParts[1].split(":") : [];
      const explicit = [...left, ...right];
      if (explicit.some(segment => !/^[0-9a-f]{1,4}$/.test(segment))) return null;

      if (compressedParts.length === 1) return explicit.length === 8 ? explicit : null;

      const zeroCount = 8 - explicit.length;
      if (zeroCount < 1) return null;
      return [...left, ...Array(zeroCount).fill("0"), ...right];
    }

    function formatTargetLabelForDisplay(target) {
      const label = cleanText(target?.label);
      if (!shouldShowDomains() && looksLikeDomainLabel(label, target?.host)) return hiddenDomainText();
      if (!state.isPrivacyMode || !label) return label;

      const host = cleanText(target?.host);
      if (host && label.includes(host)) {
        return label.split(host).join(maskDomainForPrivacy(host));
      }
      return label.includes(".") ? maskDomainForPrivacy(label) : label;
    }

    function formatTargetHostForDisplay(host) {
      const value = cleanText(host);
      if (!shouldShowDomains()) return hiddenDomainText();
      if (!state.isPrivacyMode || !value) return value;
      return maskDomainForPrivacy(value);
    }

    function shouldShowDomains() {
      return state.display.show_domains !== false;
    }

    function hiddenDomainText() {
      return "-";
    }

    function looksLikeDomainLabel(label, host) {
      const value = cleanText(label);
      if (!value) return false;
      return value === cleanText(host) || value.includes(".");
    }

    function maskDomainForPrivacy(value) {
      const raw = cleanText(value);
      if (!raw) return "";
      const hostname = extractHostname(raw);
      if (!hostname) return raw;

      const labels = hostname.split(".").filter(Boolean);
      if (labels.length < 2) return raw.replace(hostname, maskDomainLabel(hostname));

      // 保留首级线路编号和顶级域名，只隐藏中间可识别的业务域名片段。
      const maskedHostname = labels.map((label, index) => {
        const isTopLevelDomain = index === labels.length - 1;
        const isFirstRouteLabel = labels.length >= 3 && index === 0;
        return isTopLevelDomain || isFirstRouteLabel ? label : maskDomainLabel(label);
      }).join(".");
      return raw.replace(hostname, maskedHostname);
    }

    function maskDomainLabel(label) {
      const value = cleanText(label);
      if (!value) return "";
      if (value.length <= 1) return "*";
      if (value.length === 2) return `${value[0]}*`;
      if (value.length <= 4) return `${value[0]}${"*".repeat(value.length - 2)}${value[value.length - 1]}`;

      const visiblePrefixLength = value.length >= 8 ? 2 : 1;
      const maskLength = Math.max(2, value.length - visiblePrefixLength - 1);
      return `${value.slice(0, visiblePrefixLength)}${"*".repeat(maskLength)}${value[value.length - 1]}`;
    }

    function extractHostname(value) {
      const raw = cleanText(value);
      if (!raw) return "";
      try {
        const url = new URL(raw.includes("://") ? raw : `https://${raw}`);
        return cleanText(url.hostname);
      } catch (error) {
        const hostWithPort = raw.split(/[/?#]/)[0];
        if (hostWithPort.startsWith("[") && hostWithPort.includes("]")) {
          return hostWithPort.slice(1, hostWithPort.indexOf("]"));
        }
        return hostWithPort.split(":")[0];
      }
    }

    function parseTrace(text) {
      const fields = {};
      cleanText(text).split(/\r?\n/).forEach(line => {
        const separatorIndex = line.indexOf("=");
        if (separatorIndex <= 0) return;
        const key = cleanText(line.slice(0, separatorIndex));
        if (!key) return;
        fields[key] = line.slice(separatorIndex + 1).trim();
      });
      return {
        ip: cleanText(fields.ip),
        loc: cleanText(fields.loc),
        colo: cleanText(fields.colo),
      };
    }

    function summarizeLatency(samples) {
      const sorted = [...samples].sort((a, b) => a - b);
      return {
        latency_ms: sorted[Math.floor(sorted.length / 2)],
        jitter_ms: calculateJitter(samples),
        samples_ms: samples.map(roundMetric),
      };
    }

    function calculateJitter(samples) {
      if (samples.length < 2) return 0;
      let totalDelta = 0;
      for (let index = 1; index < samples.length; index += 1) {
        totalDelta += Math.abs(samples[index] - samples[index - 1]);
      }
      return roundMetric(totalDelta / (samples.length - 1));
    }

    function stableSpeed(samples) {
      if (!samples.length) return 0;
      const sorted = [...samples].sort((a, b) => a - b);
      return sorted[Math.min(sorted.length - 1, Math.floor(sorted.length * 0.75))];
    }

    function progressRatio(elapsed, bytes, contentLength, downloadTestMs = state.test.download_test_ms) {
      const timeRatio = elapsed / downloadTestMs;
      const byteRatio = contentLength > 0 ? bytes / contentLength : 0;
      return Math.max(timeRatio, byteRatio);
    }

    function playButtonClickFeedback(button) {
      if (!(button instanceof HTMLButtonElement) || button.disabled) return;
      const activeTimer = clickFeedbackTimers.get(button);
      if (activeTimer) window.clearTimeout(activeTimer);
      button.classList.remove("click-feedback");
      void button.offsetWidth;
      button.classList.add("click-feedback");
      const timer = window.setTimeout(() => {
        button.classList.remove("click-feedback");
        clickFeedbackTimers.delete(button);
      }, BUTTON_CLICK_FEEDBACK_MS);
      clickFeedbackTimers.set(button, timer);
    }

    function toggleHistory(show) {
      const wasOpen = state.isHistoryOpen;
      window.clearTimeout(historyAnimationTimer);
      historyAnimationTimer = 0;
      els.historyModal.classList.remove("is-entering", "is-leaving");
      state.isHistoryOpen = show;
      els.historyModal.setAttribute("aria-hidden", String(!show));
      els.historyBtn.setAttribute("aria-expanded", String(show));
      document.body.classList.toggle("history-open", show);
      if (show) {
        els.historyModal.classList.add("active");
        if (!wasOpen) {
          els.historyModal.classList.add("is-entering");
          historyAnimationTimer = window.setTimeout(() => finishHistoryAnimation("is-entering"), HISTORY_OPEN_ANIMATION_MS);
          window.requestAnimationFrame(() => els.historyModal.focus({ preventScroll: true }));
        }
      } else {
        els.historyModal.classList.remove("active");
        if (wasOpen) {
          els.historyModal.classList.add("is-leaving");
          historyAnimationTimer = window.setTimeout(() => finishHistoryAnimation("is-leaving"), HISTORY_CLOSE_ANIMATION_MS);
        }
        if (document.body.classList.contains("keyboard-focus")) {
          els.historyBtn.focus({ preventScroll: true });
        }
      }
    }

    function finishHistoryAnimation(className) {
      els.historyModal.classList.remove(className);
      historyAnimationTimer = 0;
    }

    function formatLatency(value) {
      return typeof value === "number" ? `${value.toFixed(0)} ms` : "-";
    }

    function formatTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "-";
      return date.toLocaleString("zh-CN", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
      });
    }

    function readHistoryPreference(key) {
      try {
        return window.localStorage.getItem(key) === "true";
      } catch {
        return false;
      }
    }

    function writeHistoryPreference(key, value) {
      try {
        window.localStorage.setItem(key, String(Boolean(value)));
      } catch {
        // 浏览器禁用本地存储时，只保留当前页面内存状态。
      }
    }

    function roundMetric(value) {
      return Math.round((Number(value) || 0) * 10) / 10;
    }

    function sleep(ms) {
      return new Promise(resolve => window.setTimeout(resolve, ms));
    }

    function cleanText(value) {
      return String(value || "").trim();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>

</html>
